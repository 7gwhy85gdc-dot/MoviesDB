// ---------- Infinite scroll (all tabs except home) ----------
// Home keeps manual "load more" buttons per row; every other view (movies, tv,
// asian tabs, genre/year filters, search) auto-loads the next page once its
// button scrolls near the viewport.
const infiniteScrollObserver = "IntersectionObserver" in window
  ? new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const button = entry.target;
        if (!button.isConnected || button.disabled) return;
        if (paginationState && paginationState.mode === "home") return;
        loadMoreResults(button.dataset.loadStream, button);
      });
    }, { rootMargin: "600px" })
  : null;

function observeLoadMoreButtons() {
  if (!infiniteScrollObserver) return;
  main.querySelectorAll(".load-more-btn[data-load-stream]").forEach((button) => {
    infiniteScrollObserver.observe(button);
  });
}

// Re-scan whenever the main content changes (tab switch, filter, search,
// pagination append) so newly inserted "load more" buttons get observed too.
let observerScanScheduled = false;
const mainContentObserver = new MutationObserver(() => {
  if (observerScanScheduled) return;
  observerScanScheduled = true;
  requestAnimationFrame(() => {
    observerScanScheduled = false;
    observeLoadMoreButtons();
  });
});
mainContentObserver.observe(main, { childList: true, subtree: true });

// ---------- Modal ----------
let modalPreviouslyFocused = null;

async function openModal(id, type, source = "tmdb") {
  const summaryItem = renderedItemCache.get(renderedItemKey(id, type, source));
  modalPreviouslyFocused = document.activeElement;
  modalOverlay.classList.add("open");
  modalContent.innerHTML = `
    <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
    <div style="padding:60px 20px;">${loadingState()}</div>`;
  document.body.style.overflow = "hidden";
  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("modalCloseBtn").focus();
  try {
    if (source === "tvmaze") {
      const show = await tvmazeFetch(`/shows/${id}?embed[]=cast&embed[]=episodes`);
      const normalizedDetails = normalizeTvmazeShow(show);
      const details = await ensureArabicDescription({
        ...summaryItem,
        ...normalizedDetails,
        poster_url: normalizedDetails.poster_url || summaryItem?.poster_url || null,
        backdrop_url: normalizedDetails.backdrop_url || summaryItem?.backdrop_url || null
      });
      if (!isAllowedContent(details)) {
        modalContent.innerHTML = `
          <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
          <div style="padding:60px 20px;">${emptyState("هذا المحتوى غير متاح في هذا التطبيق.")}</div>`;
        document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
        document.getElementById("modalCloseBtn").focus();
        return;
      }
      renderModal(details, normalizeTvmazeCast(show), type, { results: [] });
      return;
    }
    if (source === "mdl") {
      try {
        const [rawDetails, rawCast] = await Promise.all([
          mdlFetch(`/api/id/${id}`),
          mdlFetch(`/api/id/${id}/cast`).catch(() => ({ cast: {} }))
        ]);
        const normalizedDetails = normalizeMdlDetails(rawDetails, type);
        const details = await ensureArabicDescription({
          ...summaryItem,
          ...normalizedDetails,
          poster_url: normalizedDetails.poster_url || summaryItem?.poster_url || null,
          backdrop_url: normalizedDetails.backdrop_url || summaryItem?.backdrop_url || null
        });
        if (!isAllowedContent(details)) {
          modalContent.innerHTML = `
            <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
            <div style="padding:60px 20px;">${emptyState("هذا المحتوى غير متاح في هذا التطبيق.")}</div>`;
          document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
          document.getElementById("modalCloseBtn").focus();
          return;
        }
        renderModal(details, normalizeMdlCast(rawCast), details.type, { results: [] });
        return;
      } catch (mdlError) {
        if (type === "tv") {
          const fallbackQuery = String(id).replace(/^\d+-/, "").replace(/-/g, " ");
          const fallbackMatches = await searchTvmazeAsianShows(fallbackQuery).catch(() => []);
          if (fallbackMatches.length) {
            const fallbackShow = await tvmazeFetch(`/shows/${fallbackMatches[0].id}?embed[]=cast&embed[]=episodes`);
            renderModal(
              await ensureArabicDescription(normalizeTvmazeShow(fallbackShow)),
              normalizeTvmazeCast(fallbackShow),
              "tv",
              { results: [] }
            );
            return;
          }
        }
        if (summaryItem && isAllowedContent(summaryItem)) {
          renderModal(summaryItem, { cast: [] }, type, { results: [] });
          return;
        }
        throw mdlError;
      }
    }
    const endpoint = type === "movie" ? "movie" : "tv";
    const [details, arabicDetails, credits, videos] = await Promise.all([
      tmdbFetch(`/${endpoint}/${id}?language=en-US&append_to_response=release_dates,content_ratings`),
      tmdbFetch(`/${endpoint}/${id}?language=ar`),
      tmdbFetch(`/${endpoint}/${id}/credits?language=en-US`),
      tmdbFetch(`/${endpoint}/${id}/videos`)
    ]);
    const localizedDetails = await ensureArabicDescription(applyArabicTitle(details, arabicDetails));
    if (!isAllowedContent(localizedDetails)) {
      modalContent.innerHTML = `
        <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
        <div style="padding:60px 20px;">${emptyState("هذا المحتوى غير متاح في هذا التطبيق.")}</div>`;
      document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
      document.getElementById("modalCloseBtn").focus();
      return;
    }
    renderModal(localizedDetails, credits, type, videos);
  } catch(e) {
    modalContent.innerHTML = `
      <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
      <div style="padding:60px 20px;">${errorState()}</div>`;
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("modalCloseBtn").focus();
  }
}

function findTrailerUrl(videos, item) {
  const yt = (videos?.results || []).filter(v => v.site === "YouTube");
  if (yt.length) {
    const officialTrailer = yt.find(v => v.type === "Trailer" && v.official);
    const anyTrailer = yt.find(v => v.type === "Trailer");
    const teaser = yt.find(v => v.type === "Teaser");
    const chosen = officialTrailer || anyTrailer || teaser || yt[0];
    return `https://www.youtube.com/watch?v=${chosen.key}`;
  }

  // MyDramaList and TVmaze do not provide trailer videos through the
  // endpoints used by this app. Keep the button available by opening a
  // focused YouTube search for the official trailer.
  const title = item.original_title || item.original_name || item.title || item.name || "";
  const year = (item.release_date || item.first_air_date || "").slice(0, 4);
  if (!title) return null;
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(`${title} ${year} official trailer`)}`;
}

function renderModal(d, credits, type, videos) {
  const displayTitle = getDisplayTitle(d);
  const secondaryTitle = getSecondaryTitle(d);
  const showSecondaryTitle = !!secondaryTitle;
  const originalTitle = d.original_title || d.original_name || displayTitle;
  const arabicTitle = getArabicTitle(d);
  const year = (d.release_date || d.first_air_date || "").slice(0,4);
  const runtime = d.runtime ? `${d.runtime} دقيقة` : (d.episode_run_time && d.episode_run_time[0] ? `${d.episode_run_time[0]} دقيقة/حلقة` : "");
  const source = itemSource(d);
  const fav = isFavorite(d.id, type, source);
  const watched = isWatched(d.id, type, source);
  const watchedEntry = watchHistory.find(w => w.id === d.id && w.type === type && itemSource(w) === source);
  const genres = (d.genres || []).map(g => `<span class="genre-pill">${escapeHtml(g.name)}</span>`).join("");
  const cast = (credits.cast || []).slice(0, 10);
  const overview = d.overview && d.overview.trim() !== "" ? d.overview : "لا يوجد وصف متاح بالعربية لهذا العمل.";
  const tagline = d.tagline ? `<div class="modal-tagline">"${escapeHtml(d.tagline)}"</div>` : "";
  const trailerUrl = findTrailerUrl(videos, d);
  const watchedDateText = watched && watchedEntry ? `<div class="watched-date">شوهد بتاريخ ${new Date(watchedEntry.watched_at).toLocaleDateString('ar-EG')}</div>` : "";

  const backdropUrl = d.backdrop_url || (d.backdrop_path ? `${BACKDROP_BASE}${d.backdrop_path}` : "");
  const posterUrl = d.poster_url || (d.poster_path ? `${IMG_BASE}${d.poster_path}` : "");
  const heroImageUrl = backdropUrl || posterUrl;
  const usesPosterFallback = !backdropUrl && !!posterUrl;
  modalContent.innerHTML = `
    <div class="modal-backdrop-img">
      ${heroImageUrl
        ? `<img class="modal-backdrop-media ${usesPosterFallback ? "poster-fallback" : ""}" src="${escapeHtml(heroImageUrl)}" alt="${escapeHtml(displayTitle)}">`
        : `<div class="poster-placeholder" style="height:100%;display:flex;align-items:center;justify-content:center;">${escapeHtml(displayTitle)}</div>`}
      <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
      <button class="modal-fav ${fav ? 'active' : ''}" id="modalFavBtn" aria-label="إضافة للمفضلة">${fav ? '♥' : '♡'}</button>
    </div>
    <div class="modal-body">
      <h2 class="modal-title">${escapeHtml(displayTitle)}</h2>
      ${showSecondaryTitle ? `<div style="color: var(--gold); font-weight: 600; font-size: 16px; margin-bottom: 10px;">${escapeHtml(secondaryTitle)}</div>` : ""}
      <div class="modal-meta">
        <span class="gold">★ ${d.vote_average ? d.vote_average.toFixed(1) : '—'}</span>
        <span>${year || '—'}</span>
        ${runtime ? `<span>${runtime}</span>` : ''}
        ${type === 'tv' && d.number_of_seasons ? `<span>${d.number_of_seasons} ${d.number_of_seasons === 1 ? 'موسم' : 'مواسم'}</span>` : ''}
        ${type === 'tv' && d.status ? `<span>${d.status === 'Returning Series' || d.in_production ? '🟢 مستمر' : '⚪ منتهي'}</span>` : ''}
      </div>
      ${tagline}
      <div style="display:flex; flex-wrap:wrap; align-items:center;">
        ${trailerUrl ? `<a href="${escapeHtml(trailerUrl)}" target="_blank" rel="noopener" class="trailer-btn" style="margin-left:10px;">▶ شاهد الإعلان على يوتيوب</a>` : ''}
        <button class="modal-watched-btn ${watched ? 'active' : ''}" id="modalWatchedBtn">${watched ? '✔ تمت المشاهدة' : '👁 وضع كمُشاهَد'}</button>
      </div>
      ${watchedDateText}
      <div class="genre-pills">${genres}</div>
      <p class="modal-overview">${escapeHtml(overview)}</p>
      ${cast.length ? `
        <h3 style="font-size:16px; margin-bottom:12px; font-weight:700;">طاقم العمل</h3>
        <div class="cast-row">
          ${cast.map(c => `
            <div class="cast-item">
              ${c.profile_url || c.profile_path
                ? `<img class="cast-photo" src="${c.profile_url || `https://image.tmdb.org/t/p/w185${c.profile_path}`}" alt="${escapeHtml(c.name)}">`
                : `<div class="cast-photo" style="display:flex;align-items:center;justify-content:center;font-size:24px;">👤</div>`}
              <div class="cast-name">${escapeHtml(c.name)}</div>
              <div class="cast-char">${escapeHtml(c.character || '')}</div>
            </div>
          `).join("")}
        </div>
      ` : ''}
    </div>
  `;

  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("modalCloseBtn").focus();
  document.getElementById("modalFavBtn").addEventListener("click", (e) => {
    toggleFavorite(d, type);
    e.target.classList.toggle("active");
    e.target.textContent = e.target.classList.contains("active") ? "♥" : "♡";
    if (currentTab === "favorites") renderFavorites();
    else {
      // refresh fav icon on underlying card if visible
      const cardBtn = document.querySelector(`.fav-btn[data-fav-id="${d.id}"][data-fav-type="${type}"][data-fav-source="${source}"]`);
      if (cardBtn) {
        cardBtn.classList.toggle("active");
        cardBtn.textContent = cardBtn.classList.contains("active") ? "♥" : "♡";
      }
    }
  });
  document.getElementById("modalWatchedBtn").addEventListener("click", (e) => {
    toggleWatched(d, type);
    const nowActive = e.target.classList.toggle("active");
    e.target.textContent = nowActive ? "✔ تمت المشاهدة" : "👁 وضع كمُشاهَد";
    if (currentTab === "history") renderHistory();
    const cardBtn = document.querySelector(`.watched-btn[data-watched-id="${d.id}"][data-watched-type="${type}"][data-watched-source="${source}"]`);
    if (cardBtn) {
      cardBtn.classList.toggle("active");
      cardBtn.textContent = cardBtn.classList.contains("active") ? "✔" : "👁";
    }
  });
}

function closeModal() {
  modalOverlay.classList.remove("open");
  document.body.style.overflow = "";
  if (modalPreviouslyFocused instanceof HTMLElement) modalPreviouslyFocused.focus();
  modalPreviouslyFocused = null;
}
modalOverlay.addEventListener("click", (e) => {
  if (e.target === modalOverlay) closeModal();
});
document.addEventListener("keydown", (e) => {
  if (!modalOverlay.classList.contains("open")) return;
  if (e.key === "Escape") {
    closeModal();
    return;
  }
  if (e.key !== "Tab") return;
  const focusable = [...modalContent.querySelectorAll(
    'a[href], button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
  )].filter(el => el.offsetParent !== null);
  if (!focusable.length) {
    e.preventDefault();
    modalContent.focus();
    return;
  }
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault();
    last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault();
    first.focus();
  }
});

// ---------- Init ----------
async function initializeApp() {
  yearMinInput.min = MIN_YEAR;
  yearMinInput.max = CURRENT_YEAR;
  yearMaxInput.min = MIN_YEAR;
  yearMaxInput.max = CURRENT_YEAR;
  if (!yearMaxInput.value || parseInt(yearMaxInput.value) > CURRENT_YEAR) {
    yearMaxInput.value = CURRENT_YEAR;
  }
  updateYearSliderUI();
  updateGenreFilterVisibility();

  // Content and genre metadata are independent. Start both immediately so a
  // slow genre request never delays the first useful screen.
  await Promise.allSettled([
    loadGenres(),
    renderTab(currentTab)
  ]);
}

initializeApp();
</script>
