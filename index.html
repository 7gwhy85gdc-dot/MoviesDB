let modalPreviouslyFocused = null;
let modalSimilarRequestToken = 0;

async function openModal(id, type, source = "tmdb") {
  const summaryItem = renderedItemCache.get(renderedItemKey(id, type, source));
  modalPreviouslyFocused = document.activeElement;
  modalOverlay.classList.add("open");
  modalContent.innerHTML = `
    <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
    <div style="padding:60px 20px;">${loadingState()}</div>`;
  document.body.style.overflow = "hidden";
  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("modalCloseBtn").focus();
  try {
    if (source === "tvmaze") {
      const show = await tvmazeFetch(`/shows/${id}?embed[]=cast&embed[]=episodes`);
      const normalizedDetails = normalizeTvmazeShow(show);
      const details = await ensureArabicDescription({
        ...summaryItem,
        ...normalizedDetails,
        poster_url: normalizedDetails.poster_url || summaryItem?.poster_url || null,
        backdrop_url: normalizedDetails.backdrop_url || summaryItem?.backdrop_url || null
      });
      if (!isAllowedContent(details)) {
        modalContent.innerHTML = `
          <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
          <div style="padding:60px 20px;">${emptyState("هذا المحتوى غير متاح في هذا التطبيق.")}</div>`;
        document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
        document.getElementById("modalCloseBtn").focus();
        return;
      }
      renderModal(details, normalizeTvmazeCast(show), type, { results: [] });
      return;
    }
    if (source === "mdl") {
      try {
        const [rawDetails, rawCast] = await Promise.all([
          mdlFetch(`/api/id/${id}`),
          mdlFetch(`/api/id/${id}/cast`).catch(() => ({ cast: {} }))
        ]);
        const normalizedDetails = normalizeMdlDetails(rawDetails, type);
        const details = await ensureArabicDescription({
          ...summaryItem,
          ...normalizedDetails,
          poster_url: normalizedDetails.poster_url || summaryItem?.poster_url || null,
          backdrop_url: normalizedDetails.backdrop_url || summaryItem?.backdrop_url || null
        });
        if (!isAllowedContent(details)) {
          modalContent.innerHTML = `
            <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
            <div style="padding:60px 20px;">${emptyState("هذا المحتوى غير متاح في هذا التطبيق.")}</div>`;
          document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
          document.getElementById("modalCloseBtn").focus();
          return;
        }
        renderModal(details, normalizeMdlCast(rawCast), details.type, { results: [] });
        return;
      } catch (mdlError) {
        if (type === "tv") {
          const fallbackQuery = String(id).replace(/^\d+-/, "").replace(/-/g, " ");
          const fallbackMatches = await searchTvmazeAsianShows(fallbackQuery).catch(() => []);
          if (fallbackMatches.length) {
            const fallbackShow = await tvmazeFetch(`/shows/${fallbackMatches[0].id}?embed[]=cast&embed[]=episodes`);
            renderModal(
              await ensureArabicDescription(normalizeTvmazeShow(fallbackShow)),
              normalizeTvmazeCast(fallbackShow),
              "tv",
              { results: [] }
            );
            return;
          }
        }
        if (summaryItem && isAllowedContent(summaryItem)) {
          renderModal(summaryItem, { cast: [] }, type, { results: [] });
          return;
        }
        throw mdlError;
      }
    }
    const endpoint = type === "movie" ? "movie" : "tv";
    const [details, arabicDetails, credits, videosDefault, videosEnglish] = await Promise.all([
      tmdbFetch(`/${endpoint}/${id}?language=en-US&append_to_response=release_dates,content_ratings,external_ids`),
      tmdbFetch(`/${endpoint}/${id}?language=ar`),
      tmdbFetch(`/${endpoint}/${id}/credits?language=en-US`),
      tmdbFetch(`/${endpoint}/${id}/videos`),
      tmdbFetch(`/${endpoint}/${id}/videos?language=en-US`).catch(() => ({ results: [] }))
    ]);
    const seenVideoKeys = new Set();
    const videos = {
      results: [
        ...(videosEnglish?.results || []),
        ...(videosDefault?.results || [])
      ].filter(video => {
        const key = video?.key || video?.id;
        if (!key || seenVideoKeys.has(key)) return false;
        seenVideoKeys.add(key);
        return true;
      })
    };
    const localizedDetails = await ensureArabicDescription(applyArabicTitle(details, arabicDetails));
    if (!isAllowedContent(localizedDetails)) {
      modalContent.innerHTML = `
        <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
        <div style="padding:60px 20px;">${emptyState("هذا المحتوى غير متاح في هذا التطبيق.")}</div>`;
      document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
      document.getElementById("modalCloseBtn").focus();
      return;
    }
    renderModal(localizedDetails, credits, type, videos);
  } catch(e) {
    modalContent.innerHTML = `
      <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
      <div style="padding:60px 20px;">${errorState()}</div>`;
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("modalCloseBtn").focus();
  }
}

function tmdbVideoScore(video) {
  const type = String(video.type || "").toLowerCase();
  const name = String(video.name || "").toLowerCase();
  let score = 0;
  if (type === "trailer") score += 100;
  if (video.official) score += 45;
  if (/\bofficial\b/.test(name)) score += 25;
  if (/\btrailer\b/.test(name)) score += 20;
  if (/\bteaser\b/.test(name)) score += 5;
  if (/\b(clip|scene|featurette|behind|bts|interview|promo|music video|song|recap|review)\b/.test(name)) score -= 80;
  if (type === "clip" || type === "featurette" || type === "behind the scenes") score -= 100;
  if (video.iso_639_1 === "en") score += 8;
  return score;
}

function cleanTrailerSearchTitle(item) {
  return String(item.original_title || item.original_name || item.title || item.name || "")
    .replace(/\s*\(\d{4}\)\s*$/, "")
    .trim();
}

function findTrailerUrl(videos, item, type = null) {
  const yt = (videos?.results || [])
    .filter(v => v.site === "YouTube" && v.key)
    .sort((a, b) => tmdbVideoScore(b) - tmdbVideoScore(a));
  if (yt.length) {
    const chosen = yt[0];
    return `https://www.youtube.com/watch?v=${chosen.key}`;
  }

  // MyDramaList and TVmaze do not provide trailer videos through the
  // endpoints used by this app. Keep the button available by opening a
  // focused YouTube search for the official trailer.
  const title = cleanTrailerSearchTitle(item);
  const year = (item.release_date || item.first_air_date || "").slice(0, 4);
  if (!title) return null;
  const contentType = type === "tv" ? "series" : "movie";
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(`${title} ${year} ${contentType} official trailer`)}`;
}

function episodeCountText(count) {
  const value = parseInt(count, 10);
  if (!Number.isFinite(value) || value <= 0) return "";
  if (value === 1) return "حلقة واحدة";
  if (value === 2) return "حلقتان";
  if (value >= 3 && value <= 10) return `${value} حلقات`;
  return `${value} حلقة`;
}

function episodeGridRatingClass(rating) {
  const value = Number(rating);
  if (!Number.isFinite(value) || value <= 0) return "rating-unrated";
  if (value >= 9.6) return "rating-absolute";
  if (value >= 9.0) return "rating-awesome";
  if (value >= 8.0) return "rating-great";
  if (value >= 7.0) return "rating-good";
  if (value >= 6.0) return "rating-regular";
  if (value >= 4.0) return "rating-bad";
  return "rating-garbage";
}

function normalizeEpisodeGrid(grid, sourceLabel) {
  const seasons = (grid?.seasons || [])
    .map(season => ({
      season: parseInt(season.season, 10),
      average: Number.isFinite(Number(season.average)) ? Number(season.average) : null,
      episodes: (season.episodes || [])
        .map(episode => ({
          episode: parseInt(episode.episode, 10),
          rating: Number.isFinite(Number(episode.rating)) && Number(episode.rating) > 0 ? Number(episode.rating) : null,
          votes: episode.votes || episode.vote_count || episode.numVotes || null
        }))
        .filter(episode => Number.isFinite(episode.episode) && episode.episode > 0)
        .sort((a, b) => a.episode - b.episode)
    }))
    .filter(season => Number.isFinite(season.season) && season.season > 0 && season.episodes.length)
    .sort((a, b) => a.season - b.season);

  const totalEpisodes = seasons.reduce((sum, season) => sum + season.episodes.length, 0);
  const ratedEpisodes = seasons.reduce((sum, season) => sum + season.episodes.filter(episode => episode.rating).length, 0);
  if (!seasons.length || !ratedEpisodes) return null;
  return {
    found: true,
    sourceLabel,
    seasons,
    totalEpisodes,
    ratedEpisodes
  };
}

async function resolveTmdbTvDetailsForEpisodeGrid(item) {
  if (itemSource(item) === "tmdb" && item?.id) {
    if (Array.isArray(item.seasons) && item.seasons.length) return item;
    return tmdbFetch(`/tv/${item.id}?language=en-US`);
  }

  const query = cleanTrailerSearchTitle(item) || getDisplayTitle(item);
  if (!query) return null;
  const year = String(yearOf(item) || "").match(/\d{4}/)?.[0] || "";
  const baseEndpoint = `/search/tv?language=en-US&query=${encodeURIComponent(query)}`;
  const endpoint = year ? `${baseEndpoint}&first_air_date_year=${year}` : baseEndpoint;
  const search = await tmdbFetch(endpoint).catch(() => null);
  let candidates = (search?.results || []).filter(isAllowedContent);
  if (!candidates.length && year) {
    const relaxed = await tmdbFetch(baseEndpoint).catch(() => null);
    candidates = (relaxed?.results || []).filter(isAllowedContent);
  }
  if (!candidates.length) return null;
  const itemTitle = simpleTitleKey(getDisplayTitle(item) || item.original_name || item.name || item.title);
  candidates.sort((a, b) => {
    const aTitle = simpleTitleKey(a.name || a.original_name || "");
    const bTitle = simpleTitleKey(b.name || b.original_name || "");
    const aScore = (aTitle === itemTitle ? 50 : 0) + (year && yearOf(a) === year ? 20 : 0) + (a.popularity || 0);
    const bScore = (bTitle === itemTitle ? 50 : 0) + (year && yearOf(b) === year ? 20 : 0) + (b.popularity || 0);
    return bScore - aScore;
  });
  return tmdbFetch(`/tv/${candidates[0].id}?language=en-US`).catch(() => null);
}

async function resolveEpisodeGridImdbTitleId(item, type) {
  const directId = await resolveImdbTitleId(item, type);
  if (directId) return directId;
  if (type !== "tv") return "";

  const tmdbDetails = await resolveTmdbTvDetailsForEpisodeGrid(item);
  if (!tmdbDetails?.id) return "";
  const embeddedId = getImdbTitleId(tmdbDetails);
  if (embeddedId) return embeddedId;

  try {
    const externalIds = await tmdbFetch(`/tv/${tmdbDetails.id}/external_ids?language=en-US`);
    return getImdbTitleId({ external_ids: externalIds }) || "";
  } catch(e) {
    return "";
  }
}

function renderEpisodeRatingsGrid(container, grid) {
  const seasons = grid.seasons || [];
  const maxEpisode = Math.max(...seasons.flatMap(season => season.episodes.map(episode => episode.episode)));
  const bySeason = new Map(seasons.map(season => [
    season.season,
    new Map(season.episodes.map(episode => [episode.episode, episode]))
  ]));
  const rated = grid.ratedEpisodes || seasons.reduce((sum, season) => sum + season.episodes.filter(episode => episode.rating).length, 0);
  const total = grid.totalEpisodes || seasons.reduce((sum, season) => sum + season.episodes.length, 0);
  const sourceName = grid.sourceLabel || grid.source || "IMDb / TMDB";

  const headerCells = [
    `<div class="episode-grid-label"></div>`,
    ...seasons.map(season => `<div class="episode-grid-label">S${season.season}</div>`)
  ];
  const bodyCells = [];
  for (let episodeNumber = 1; episodeNumber <= maxEpisode; episodeNumber++) {
    bodyCells.push(`<div class="episode-grid-label">E${episodeNumber}</div>`);
    for (const season of seasons) {
      const episode = bySeason.get(season.season)?.get(episodeNumber);
      if (!episode) {
        bodyCells.push(`<div class="episode-grid-cell empty" aria-label="لا توجد حلقة">—</div>`);
        continue;
      }
      const rating = episode.rating;
      const votes = formatVoteCount(episode.votes);
      bodyCells.push(`
        <div class="episode-grid-cell ${episodeGridRatingClass(rating)}"
             title="S${season.season} E${episodeNumber}${votes ? ` · ${votes} صوت` : ""}">
          ${rating ? rating.toFixed(1) : "—"}
        </div>
      `);
    }
  }
  const avgCells = [
    `<div class="episode-grid-label">AVG</div>`,
    ...seasons.map(season => `
      <div class="episode-grid-cell episode-grid-average ${episodeGridRatingClass(season.average)}"
           title="متوسط الموسم ${season.season}">
        ${season.average ? Number(season.average).toFixed(1) : "—"}
      </div>
    `)
  ];

  container.innerHTML = `
    <div class="episode-grid-head">
      <div>
        <div class="episode-grid-title">📊 شبكة تقييمات الحلقات</div>
        <div class="episode-grid-source">${escapeHtml(sourceName)} · ${rated} من ${total} حلقة لديها تقييم</div>
      </div>
    </div>
    <div class="episode-grid-legend" aria-label="مفتاح ألوان التقييم">
      <span><i style="background:#38bdf8"></i>9.6+</span>
      <span><i style="background:#4ade80"></i>9.0+</span>
      <span><i style="background:#a3e635"></i>8.0+</span>
      <span><i style="background:#f2bd12"></i>7.0+</span>
      <span><i style="background:#fb7a20"></i>6.0+</span>
      <span><i style="background:#ef4444"></i>أقل</span>
    </div>
    <div class="episode-grid-scroll">
      <div class="episode-grid-table" style="grid-template-columns: 44px repeat(${seasons.length}, minmax(72px, 1fr));">
        ${headerCells.join("")}
        ${bodyCells.join("")}
        ${avgCells.join("")}
      </div>
    </div>
  `;
}

async function loadModalEpisodeRatingsGrid(item, type) {
  const container = document.getElementById("modalEpisodeRatingsGrid");
  if (!container || type !== "tv") return;
  try {
    const imdbId = await resolveEpisodeGridImdbTitleId(item, type);
    let grid = null;
    if (imdbId) {
      const imdbGrid = await imdbEpisodeGridFetch(imdbId);
      grid = normalizeEpisodeGrid(imdbGrid, "IMDb public datasets");
    }
    if (!document.getElementById("modalEpisodeRatingsGrid")) return;
    if (!grid) {
      container.innerHTML = `<div class="episode-grid-state">لا توجد تقييمات حلقات من IMDb لهذا المسلسل.</div>`;
      return;
    }
    renderEpisodeRatingsGrid(container, grid);
  } catch(e) {
    if (document.getElementById("modalEpisodeRatingsGrid")) {
      container.innerHTML = `<div class="episode-grid-state">تعذر تحميل تقييمات الحلقات من IMDb الآن.</div>`;
    }
  }
}

function renderModal(d, credits, type, videos) {
  const similarToken = ++modalSimilarRequestToken;
  const displayTitle = getDisplayTitle(d);
  const secondaryTitle = getSecondaryTitle(d);
  const showSecondaryTitle = !!secondaryTitle;
  const originalTitle = d.original_title || d.original_name || displayTitle;
  const arabicTitle = getArabicTitle(d);
  const year = (d.release_date || d.first_air_date || "").slice(0,4);
  const runtime = d.runtime ? `${d.runtime} دقيقة` : (d.episode_run_time && d.episode_run_time[0] ? `${d.episode_run_time[0]} دقيقة/حلقة` : "");
  const source = itemSource(d);
  const fav = isFavorite(d.id, type, source);
  const queued = isInWatchlist(d.id, type, source);
  const watched = isWatched(d.id, type, source);
  const watchedEntry = watchHistory.find(w => w.id === d.id && w.type === type && itemSource(w) === source);
  const genres = (d.genres || []).map(g => `<span class="genre-pill">${escapeHtml(g.name)}</span>`).join("");
  const cast = (credits.cast || []).slice(0, 10);
  const overview = d.overview && d.overview.trim() !== "" ? d.overview : "لا يوجد وصف متاح بالعربية لهذا العمل.";
  const tagline = d.tagline ? `<div class="modal-tagline">"${escapeHtml(d.tagline)}"</div>` : "";
  const trailerUrl = findTrailerUrl(videos, d, type);
  const episodesText = episodeCountText(d.number_of_episodes);
  const watchedDateText = watched && watchedEntry ? `<div class="watched-date">شوهد بتاريخ ${new Date(watchedEntry.watched_at).toLocaleDateString('ar-EG')}</div>` : "";
  const imdbId = getImdbTitleId(d);
  const canLoadImdbRating = imdbId || source === "tmdb" || (source === "tvmaze" && d.external_ids);
  const imdbRatingMeta = canLoadImdbRating
    ? `<span class="imdb-rating-meta loading" id="modalImdbRating" data-imdb-id="${escapeHtml(imdbId)}">IMDb: جاري التحميل…</span>`
    : "";

  const backdropUrl = d.backdrop_url || (d.backdrop_path ? `${BACKDROP_BASE}${d.backdrop_path}` : "");
  const posterUrl = d.poster_url || (d.poster_path ? `${IMG_BASE}${d.poster_path}` : "");
  const heroImageUrl = backdropUrl || posterUrl;
  const usesPosterFallback = !backdropUrl && !!posterUrl;
  modalContent.innerHTML = `
    <div class="modal-backdrop-img">
      ${heroImageUrl
        ? `<img class="modal-backdrop-media ${usesPosterFallback ? "poster-fallback" : ""}" src="${escapeHtml(heroImageUrl)}" alt="${escapeHtml(displayTitle)}">`
        : `<div class="poster-placeholder" style="height:100%;display:flex;align-items:center;justify-content:center;">${escapeHtml(displayTitle)}</div>`}
      <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق">✕</button>
      <button class="modal-fav ${fav ? 'active' : ''}" id="modalFavBtn" aria-label="إضافة للمفضلة">${fav ? '♥' : '♡'}</button>
      <button class="modal-watchlist ${queued ? 'active' : ''}" id="modalWatchlistBtn" aria-label="إضافة لقائمة المشاهدة">${queued ? '✓' : '＋'}</button>
    </div>
    <div class="modal-body">
      <h2 class="modal-title">${escapeHtml(displayTitle)}</h2>
      ${showSecondaryTitle ? `<div style="color: var(--gold); font-weight: 600; font-size: 16px; margin-bottom: 10px;">${escapeHtml(secondaryTitle)}</div>` : ""}
      <div class="modal-meta">
        <span class="gold">★ ${d.vote_average ? d.vote_average.toFixed(1) : '—'}</span>
        ${imdbRatingMeta}
        <span>${year || '—'}</span>
        ${runtime ? `<span>${runtime}</span>` : ''}
        ${type === 'tv' && d.number_of_seasons ? `<span>${d.number_of_seasons} ${d.number_of_seasons === 1 ? 'موسم' : 'مواسم'}</span>` : ''}
        ${type === 'tv' && episodesText ? `<span>${episodesText}</span>` : ''}
        ${type === 'tv' && d.status ? `<span>${d.status === 'Returning Series' || d.in_production ? '🟢 مستمر' : '⚪ منتهي'}</span>` : ''}
      </div>
      ${tagline}
      <div style="display:flex; flex-wrap:wrap; align-items:center;">
        ${trailerUrl ? `<a href="${escapeHtml(trailerUrl)}" target="_blank" rel="noopener" class="trailer-btn" style="margin-left:10px;">▶ شاهد الإعلان على يوتيوب</a>` : ''}
        <button class="modal-watched-btn ${watched ? 'active' : ''}" id="modalWatchedBtn">${watched ? '✔ تمت المشاهدة' : '👁 وضع كمُشاهَد'}</button>
      </div>
      ${watchedDateText}
      <div class="genre-pills">${genres}</div>
      <p class="modal-overview">${escapeHtml(overview)}</p>
      ${type === 'tv' ? `
        <section class="episode-grid-section" id="modalEpisodeRatingsGrid">
          <div class="episode-grid-state">جاري تحميل شبكة تقييمات الحلقات من IMDb...</div>
        </section>
      ` : ''}
      ${cast.length ? `
        <h3 style="font-size:16px; margin-bottom:12px; font-weight:700;">طاقم العمل</h3>
        <div class="cast-row">
          ${cast.map(c => `
            <div class="cast-item">
              ${c.profile_url || c.profile_path
                ? `<img class="cast-photo" src="${c.profile_url || `https://image.tmdb.org/t/p/w185${c.profile_path}`}" alt="${escapeHtml(c.name)}">`
                : `<div class="cast-photo" style="display:flex;align-items:center;justify-content:center;font-size:24px;">👤</div>`}
              <div class="cast-name">${escapeHtml(c.name)}</div>
              <div class="cast-char">${escapeHtml(c.character || '')}</div>
            </div>
          `).join("")}
        </div>
      ` : ''}
      <section class="modal-similar" id="modalSimilarRecommendations">
        <div class="modal-similar-head">
          <div>
            <div class="modal-similar-title">🔗 اقتراحات مشابهة</div>
            <div class="modal-similar-source">TMDB أولاً، ثم TasteDive احتياطياً</div>
          </div>
        </div>
        <div class="modal-similar-state">جاري تحميل اقتراحات مشابهة لهذا العمل...</div>
      </section>
    </div>
  `;

  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("modalCloseBtn").focus();
  document.getElementById("modalFavBtn").addEventListener("click", (e) => {
    toggleFavorite(d, type);
    e.target.classList.toggle("active");
    e.target.textContent = e.target.classList.contains("active") ? "♥" : "♡";
    if (currentTab === "favorites") renderFavorites();
    else {
      // refresh fav icon on underlying card if visible
      const cardBtn = document.querySelector(`.fav-btn[data-fav-id="${d.id}"][data-fav-type="${type}"][data-fav-source="${source}"]`);
      if (cardBtn) {
        cardBtn.classList.toggle("active");
        cardBtn.textContent = cardBtn.classList.contains("active") ? "♥" : "♡";
      }
    }
  });
  document.getElementById("modalWatchlistBtn").addEventListener("click", (e) => {
    toggleWatchlist(d, type);
    const nowActive = e.target.classList.toggle("active");
    e.target.textContent = nowActive ? "✓" : "＋";
    if (currentTab === "watchlist") renderWatchlist();
    else {
      const cardBtn = document.querySelector(`.watchlist-btn[data-watchlist-id="${d.id}"][data-watchlist-type="${type}"][data-watchlist-source="${source}"]`);
      if (cardBtn) {
        cardBtn.classList.toggle("active");
        cardBtn.textContent = cardBtn.classList.contains("active") ? "✓" : "＋";
      }
    }
  });
  document.getElementById("modalWatchedBtn").addEventListener("click", (e) => {
    toggleWatched(d, type);
    const nowActive = e.target.classList.toggle("active");
    e.target.textContent = nowActive ? "✔ تمت المشاهدة" : "👁 وضع كمُشاهَد";
    if (currentTab === "history") renderHistory();
    const cardBtn = document.querySelector(`.watched-btn[data-watched-id="${d.id}"][data-watched-type="${type}"][data-watched-source="${source}"]`);
    if (cardBtn) {
      cardBtn.classList.toggle("active");
      cardBtn.textContent = cardBtn.classList.contains("active") ? "✔" : "👁";
    }
  });
  loadModalImdbRating(d, type);
  loadModalEpisodeRatingsGrid(d, type);
  loadModalSimilarRecommendations(d, type, similarToken);
}

function modalTasteDiveSeed(item) {
  return cleanTrailerSearchTitle(item) || getDisplayTitle(item) || item.original_title || item.original_name || item.title || item.name || "";
}

function sameMediaItem(a, b, fallbackType = "") {
  if (!a || !b) return false;
  const aSource = itemSource(a);
  const bSource = itemSource(b);
  const aType = a.media_type || a.type || fallbackType;
  const bType = b.media_type || b.type || fallbackType;
  if (String(a.id) === String(b.id) && aType === bType && aSource === bSource) return true;
  const aTitle = simpleTitleKey(getDisplayTitle(a) || a.original_title || a.original_name);
  const bTitle = simpleTitleKey(getDisplayTitle(b) || b.original_title || b.original_name);
  const aYear = yearOf(a);
  const bYear = yearOf(b);
  return !!aTitle && aTitle === bTitle && (!aYear || !bYear || aYear === bYear);
}

async function fetchTmdbModalSimilar(item, type) {
  if (itemSource(item) !== "tmdb" || !item.id) return [];
  const endpointType = type === "tv" ? "tv" : "movie";
  const paths = [
    `/${endpointType}/${item.id}/recommendations?language=en-US&page=1`,
    `/${endpointType}/${item.id}/similar?language=en-US&page=1`
  ];

  const settled = await Promise.allSettled(paths.map(async path => {
    const [data, arabic] = await Promise.all([
      tmdbFetch(path),
      fetchArabicList(path)
    ]);
    return mergeArabicTitles(data.results || [], arabic).map(result => ({
      ...result,
      type: endpointType === "tv" ? "tv" : "movie",
      media_type: endpointType === "tv" ? "tv" : "movie",
      source: "tmdb",
      ai_reason: path.includes("/recommendations") ? "اقتراحات TMDB مرتبطة بهذا العمل." : "أعمال مشابهة حسب TMDB."
    }));
  }));

  return uniqueItems([], settled
    .filter(result => result.status === "fulfilled")
    .flatMap(result => result.value)
    .filter(isAllowedContent)
    .filter(result => !sameMediaItem(result, item, type)))
    .slice(0, 10);
}

async function fetchTasteDiveModalSimilar(item, type) {
  const key = getTasteDiveApiKey();
  if (!key) return { items: [], skippedReason: "ضع مفتاح TasteDive في تبويب اقتراحات ذكية لاستخدامه كخطة احتياطية." };

  const seed = modalTasteDiveSeed(item);
  if (!seed) return { items: [], skippedReason: "لا يوجد عنوان كافٍ لجلب اقتراحات TasteDive." };

  const data = await tasteDiveRecommend({
    tasteDiveSeed: seed,
    wantType: type === "tv" ? "tv" : "movies"
  });
  const resolved = (await resolveAiRecommendations(data, type === "tv" ? "tv" : "movies"))
    .filter(result => !sameMediaItem(result, item, type))
    .slice(0, 8);
  return { items: resolved, seed };
}

function renderModalSimilarSection(container, items, sourceLabel) {
  container.innerHTML = `
    <div class="modal-similar-head">
      <div>
        <div class="modal-similar-title">🔗 اقتراحات مشابهة</div>
        <div class="modal-similar-source">${escapeHtml(sourceLabel)}</div>
      </div>
    </div>
    <div class="grid">
      ${items.map(result => cardHtml(result, result.media_type || result.type || "movie")).join("")}
    </div>
  `;
  loadVisibleTvStatuses();
}

async function loadModalSimilarRecommendations(item, type, token) {
  const container = document.getElementById("modalSimilarRecommendations");
  if (!container) return;
  const state = container.querySelector(".modal-similar-state");

  try {
    const tmdbItems = await fetchTmdbModalSimilar(item, type);
    if (token !== modalSimilarRequestToken || !document.getElementById("modalSimilarRecommendations")) return;
    if (tmdbItems.length) {
      renderModalSimilarSection(container, tmdbItems.slice(0, 8), "TMDB Recommendations + Similar");
      return;
    }

    const fallback = await fetchTasteDiveModalSimilar(item, type);
    if (token !== modalSimilarRequestToken || !document.getElementById("modalSimilarRecommendations")) return;
    if (fallback.items.length) {
      renderModalSimilarSection(container, fallback.items, `TasteDive احتياطي بناءً على ${fallback.seed || modalTasteDiveSeed(item)}`);
      return;
    }

    if (state) {
      state.textContent = fallback.skippedReason || "لم نجد اقتراحات مشابهة كافية لهذا العمل حالياً.";
    }
  } catch(error) {
    if (token !== modalSimilarRequestToken || !document.getElementById("modalSimilarRecommendations")) return;
    if (state) {
      state.textContent = error.message || "تعذر تحميل الاقتراحات المشابهة حالياً.";
    }
  }
}

function closeModal() {
  modalSimilarRequestToken++;
  modalOverlay.classList.remove("open");
  document.body.style.overflow = "";
  if (modalPreviouslyFocused instanceof HTMLElement) modalPreviouslyFocused.focus();
  modalPreviouslyFocused = null;
}
modalOverlay.addEventListener("click", (e) => {
  if (e.target === modalOverlay) closeModal();
});
modalContent.addEventListener("click", (e) => {
  const card = e.target.closest(".modal-similar .card");
  if (!card) return;
  const source = card.dataset.source || "tmdb";
  openModal(parseSourceId(card.dataset.id, source), card.dataset.type, source);
});
modalContent.addEventListener("keydown", (e) => {
  if (e.key !== "Enter" && e.key !== " ") return;
  const card = e.target.closest(".modal-similar .card");
  if (!card || document.activeElement !== card) return;
  e.preventDefault();
  const source = card.dataset.source || "tmdb";
  openModal(parseSourceId(card.dataset.id, source), card.dataset.type, source);
});
document.addEventListener("keydown", (e) => {
  if (!modalOverlay.classList.contains("open")) return;
  if (e.key === "Escape") {
    closeModal();
    return;
  }
  if (e.key !== "Tab") return;
  const focusable = [...modalContent.querySelectorAll(
    'a[href], button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
  )].filter(el => el.offsetParent !== null);
  if (!focusable.length) {
    e.preventDefault();
    modalContent.focus();
    return;
  }
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault();
    last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault();
    first.focus();
  }
});

// ---------- Init ----------
async function initializeApp() {
  initAccountControls();
  yearMinInput.min = MIN_YEAR;
  yearMinInput.max = CURRENT_YEAR;
  yearMaxInput.min = MIN_YEAR;
  yearMaxInput.max = CURRENT_YEAR;
  if (!yearMaxInput.value || parseInt(yearMaxInput.value) > CURRENT_YEAR) {
    yearMaxInput.value = CURRENT_YEAR;
  }
  updateYearSliderUI();
  updateGenreFilterVisibility();

  // Content and genre metadata are independent. Start both immediately so a
  // slow genre request never delays the first useful screen.
  await Promise.allSettled([
    loadGenres(),
    renderTab(currentTab)
  ]);
}

initializeApp();
