function filterAllowedContent(items) {
  if (!items) return items;
  return items.filter(isAllowedContent);
}

function rowHtml(titleText, items, type, id = "") {
  items = applySort(filterAllowedContent(items), activeSort, type);
  if (!items || items.length === 0) return "";
  return `
    <h2 class="section-title">${titleText}</h2>
    <div class="row-scroll"${id ? ` id="${id}"` : ""}>
      ${items.map(i => cardHtml(i, type)).join("")}
    </div>
  `;
}

function gridHtml(items, type) {
  items = applySort(filterAllowedContent(items), activeSort, type);
  if (!items || items.length === 0) return emptyState("لا توجد نتائج");
  return `<div class="grid">${items.map(i => cardHtml(i, type)).join("")}</div>`;
}

function gridContainerHtml(items, type, id) {
  items = applySort(filterAllowedContent(items), activeSort, type);
  if (!items || items.length === 0) return `<div class="grid" id="${id}"></div>`;
  return `<div class="grid" id="${id}">${items.map(i => cardHtml(i, type)).join("")}</div>`;
}

function loadMoreHtml(stream, hasMore = true) {
  const label = stream === "recommendations" ? "عرض المزيد" : "تحميل المزيد";
  return hasMore
    ? `<div class="load-more-wrap"><button class="load-more-btn" data-load-stream="${stream}">${label}</button></div>`
    : "";
}

function addPageParam(endpoint, page) {
  return `${endpoint}${endpoint.includes("?") ? "&" : "?"}page=${page}`;
}

function uniqueItems(existing, incoming) {
  const seenIds = new Set(existing.map(item => `${itemSource(item)}:${item.id}:${item.type || item.media_type || ""}`));
  const seenContent = new Set(existing.map(contentMatchKey));
  return incoming.filter(item => {
    const idKey = `${itemSource(item)}:${item.id}:${item.type || item.media_type || ""}`;
    const contentKey = contentMatchKey(item);
    if (seenIds.has(idKey) || (contentKey && seenContent.has(contentKey))) return false;
    seenIds.add(idKey);
    if (contentKey) seenContent.add(contentKey);
    return true;
  });
}

function appendCards(containerId, items, type) {
  const container = document.getElementById(containerId);
  if (!container || !items.length) return;
  container.insertAdjacentHTML("beforeend", items.map(item => cardHtml(item, type)).join(""));
}

function replaceCards(containerId, items, type = null) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const sortedItems = applySort(filterAllowedContent(items), activeSort, type);
  container.innerHTML = sortedItems.map(item =>
    cardHtml(item, type || item.media_type || item.type)
  ).join("");
}

function refreshCurrentSort() {
  const state = paginationState;
  if (!state) {
    renderTab(currentTab);
    return;
  }
  if (state.mode === "home") {
    replaceCards("homeMoviesRow", state.movieItems, "movie");
    replaceCards("homeTvRow", state.tvItems, "tv");
    replaceCards("homeTopRow", state.topItems, "movie");
  } else if (state.mode === "dual" || state.mode === "asian") {
    replaceCards("moviesGrid", state.movieItems, "movie");
    replaceCards("tvGrid", state.tvItems, "tv");
  } else if (state.mode === "recommendations") {
    const visibleItems = state.items.slice(0, state.visibleCount || RECOMMENDATION_PAGE_SIZE);
    replaceRecommendationCards(state.containerId, visibleItems);
  } else {
    replaceCards(state.containerId, state.items, state.type || null);
  }
  loadVisibleTvStatuses();
}

// ---------- TV status badges (loaded only when cards approach the viewport) ----------
const tvStatusCache = {};
const mdlStatusCache = {};
const mdlStatusPending = {};
const mdlStatusQueue = [];
const queuedMdlStatusIds = new Set();
const tvStatusQueue = [];
const queuedTvStatusIds = new Set();
let activeTvStatusRequests = 0;
let activeMdlStatusRequests = 0;
const MAX_TV_STATUS_REQUESTS = 4;
const MAX_MDL_STATUS_REQUESTS = 3;

async function fetchTvStatus(id) {
  if (tvStatusCache[id]) return tvStatusCache[id];
  try {
    const d = await tmdbFetch(`/tv/${id}?language=en-US`);
    const info = {
      ongoing: d.status === "Returning Series" || d.in_production === true,
      statusRaw: d.status,
      seasons: d.number_of_seasons || null
    };
    tvStatusCache[id] = info;
    return info;
  } catch(e) {
    return null;
  }
}

function statusLabel(info) {
  const seasonsText = info.seasons ? `${info.seasons} ${info.seasons === 1 ? 'موسم' : 'مواسم'}` : '';
  const statusText = info.ongoing ? 'مستمر' : 'منتهي';
  return { statusText, seasonsText, cls: info.ongoing ? 'ongoing' : 'ended' };
}

function renderTvStatus(badge, info) {
  if (!badge.isConnected || !info) return;
  const { statusText, seasonsText, cls } = statusLabel(info);
  badge.classList.remove("ongoing", "ended");
  badge.classList.add(cls, "show");
  badge.innerHTML = `<span>${statusText}</span><span style="display:flex;align-items:center;">${seasonsText}<span class="status-dot"></span></span>`;
  delete badge.dataset.statusFor;
  delete badge.dataset.mdlStatusFor;
}

function parseMdlDate(text) {
  const clean = String(text || "").replace(/\s+/g, " ").trim();
  if (!clean) return null;
  const direct = new Date(clean);
  if (!Number.isNaN(direct.getTime())) return direct;
  const match = clean.match(/^([A-Za-z]{3,9})\.?\s+(\d{1,2}),?\s+(\d{4})$/);
  if (!match) return null;
  const months = {
    jan: 0, january: 0,
    feb: 1, february: 1,
    mar: 2, march: 2,
    apr: 3, april: 3,
    may: 4,
    jun: 5, june: 5,
    jul: 6, july: 6,
    aug: 7, august: 7,
    sep: 8, sept: 8, september: 8,
    oct: 9, october: 9,
    nov: 10, november: 10,
    dec: 11, december: 11
  };
  const month = months[match[1].toLowerCase()];
  const day = parseInt(match[2], 10);
  const year = parseInt(match[3], 10);
  if (!Number.isFinite(month) || !Number.isFinite(day) || !Number.isFinite(year)) return null;
  return new Date(year, month, day);
}

function inferMdlProductionStatus(details) {
  const explicit = String(details.status || details.type || "").toLowerCase();
  if (/\b(returning|ongoing|airing)\b/.test(explicit)) return true;
  if (/\b(ended|finished|completed)\b/.test(explicit)) return false;

  const aired = String(details.aired || "").trim();
  if (!aired) return null;
  const rangeParts = aired.split(/\s+-\s+/);
  const startDate = parseMdlDate(rangeParts[0]);
  if (rangeParts.length < 2) {
    if (!startDate) return null;
    return startDate.getTime() <= Date.now() ? false : null;
  }
  const endText = rangeParts[1].trim();
  if (!endText || /\?|present|ongoing|tba/i.test(endText)) {
    return startDate && startDate.getTime() <= Date.now() ? true : null;
  }
  const endDate = parseMdlDate(endText);
  if (!endDate) return null;
  if (startDate && startDate.getTime() > Date.now()) return null;
  return endDate.getTime() > Date.now();
}

async function fetchMdlStatus(id) {
  if (Object.prototype.hasOwnProperty.call(mdlStatusCache, id)) return mdlStatusCache[id];
  if (mdlStatusPending[id]) return mdlStatusPending[id];
  mdlStatusPending[id] = (async () => {
    try {
      const details = await mdlFetch(`/api/id/${id}`);
      const ongoing = inferMdlProductionStatus(details);
      const info = ongoing === null ? null : {
        ongoing,
        statusRaw: ongoing ? "Returning Series" : "Ended",
        seasons: null
      };
      mdlStatusCache[id] = info;
      return info;
    } catch(e) {
      mdlStatusCache[id] = null;
      return null;
    } finally {
      delete mdlStatusPending[id];
    }
  })();
  return mdlStatusPending[id];
}

function renderUnknownMdlStatus(badge) {
  if (!badge.isConnected) return;
  badge.classList.remove("ongoing", "ended");
  badge.innerHTML = `<span>غير معروف</span><span style="display:flex;align-items:center;">MDL<span class="status-dot"></span></span>`;
  delete badge.dataset.mdlStatusFor;
}

function processMdlStatusQueue() {
  while (activeMdlStatusRequests < MAX_MDL_STATUS_REQUESTS && mdlStatusQueue.length) {
    const { id, badge } = mdlStatusQueue.shift();
    queuedMdlStatusIds.delete(id);
    activeMdlStatusRequests++;
    fetchMdlStatus(id)
      .then(info => {
        document.querySelectorAll(`.status-badge[data-mdl-status-for="${CSS.escape(id)}"]`)
          .forEach(currentBadge => info
            ? renderTvStatus(currentBadge, info)
            : renderUnknownMdlStatus(currentBadge));
      })
      .finally(() => {
        activeMdlStatusRequests--;
        processMdlStatusQueue();
      });
  }
}

function queueMdlStatus(badge) {
  const id = badge.dataset.mdlStatusFor;
  if (Object.prototype.hasOwnProperty.call(mdlStatusCache, id)) {
    const info = mdlStatusCache[id];
    info ? renderTvStatus(badge, info) : renderUnknownMdlStatus(badge);
    return;
  }
  if (queuedMdlStatusIds.has(id)) return;
  queuedMdlStatusIds.add(id);
  mdlStatusQueue.push({ id, badge });
  processMdlStatusQueue();
}

function processTvStatusQueue() {
  while (activeTvStatusRequests < MAX_TV_STATUS_REQUESTS && tvStatusQueue.length) {
    const { id, badge } = tvStatusQueue.shift();
    queuedTvStatusIds.delete(id);
    activeTvStatusRequests++;
    fetchTvStatus(id)
      .then(info => {
        document.querySelectorAll(`.status-badge[data-status-for="${id}"]`)
          .forEach(currentBadge => renderTvStatus(currentBadge, info));
      })
      .finally(() => {
        activeTvStatusRequests--;
        processTvStatusQueue();
      });
  }
}

function queueTvStatus(badge) {
  const id = badge.dataset.statusFor;
  if (tvStatusCache[id]) {
    renderTvStatus(badge, tvStatusCache[id]);
    return;
  }
  if (queuedTvStatusIds.has(id)) return;
  queuedTvStatusIds.add(id);
  tvStatusQueue.push({ id, badge });
  processTvStatusQueue();
}

const tvStatusObserver = "IntersectionObserver" in window
  ? new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        tvStatusObserver.unobserve(entry.target);
        queueTvStatus(entry.target);
      });
    }, { rootMargin: "250px" })
  : null;

const mdlStatusObserver = "IntersectionObserver" in window
  ? new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        mdlStatusObserver.unobserve(entry.target);
        queueMdlStatus(entry.target);
      });
    }, { rootMargin: "250px" })
  : null;

function scheduleIdleWork(callback, timeout = 600) {
  if ("requestIdleCallback" in window) {
    window.requestIdleCallback(callback, { timeout });
  } else {
    requestAnimationFrame(callback);
  }
}

let tvStatusScanScheduled = false;
function loadVisibleTvStatuses() {
  if (tvStatusScanScheduled) return;
  tvStatusScanScheduled = true;
  scheduleIdleWork(() => {
    tvStatusScanScheduled = false;
  document.querySelectorAll(".status-badge[data-status-for]").forEach(badge => {
    if (tvStatusObserver) tvStatusObserver.observe(badge);
    else queueTvStatus(badge);
  });
  document.querySelectorAll(".status-badge[data-mdl-status-for]").forEach(badge => {
    if (mdlStatusObserver) mdlStatusObserver.observe(badge);
    else queueMdlStatus(badge);
  });
  });
}

function isAsianTab(tab = currentTab) {
  return tab === "asianMovies" || tab === "asianTv";
}

function tabContentType(tab = currentTab) {
  if (tab === "movies" || tab === "asianMovies") return "movie";
  if (tab === "tv" || tab === "asianTv") return "tv";
  return null;
}

function isAsianContent(item) {
  if (itemSource(item) === "mdl") return true;
  const countries = [
    ...(item.origin_country || []),
    ...(item.production_countries || []).map(c => c.iso_3166_1).filter(Boolean)
  ];
  const langCountry = ASIAN_LANGUAGE_COUNTRY[item.original_language];
  return countries.some(country => ASIAN_COUNTRIES.includes(country)) || ASIAN_COUNTRIES.includes(langCountry);
}

function filterForCurrentTab(items, type = null, tab = currentTab) {
  let filtered = filterAllowedContent(items || []);
  const wantedType = tabContentType(tab) || type;
  if (wantedType) {
    filtered = filtered.filter(item => (item.media_type || item.type || wantedType) === wantedType);
  }
  if (isAsianTab(tab)) {
    const allowedCountries = activeCountryFilter ? [activeCountryFilter] : ASIAN_COUNTRIES;
    filtered = filtered.filter(item => matchesAsianCountry(item, allowedCountries));
  } else if (tab === "movies" || tab === "tv") {
    filtered = filtered.filter(item => !isAsianContent(item));
  }
  return filtered;
}

function buildDiscoverQuery(type) {
  const params = [`language=en-US`, `sort_by=${tmdbSortValue(type)}`];
  if (activeSort === "rating-desc") params.push(`vote_count.gte=${minimumRatingVotes(type)}`);
  // TMDB already receives include_adult=false in tmdbFetch(). Do not cap movies
  // at PG-13 here; many normal non-adult films are R/18+ because of violence,
  // horror, language, or mature themes.
  const specialTvCategory = type === "tv" ? activeTvSpecialCategory() : null;
  if (specialTvCategory) {
    params.push(...specialTvCategory.params);
  } else if (activeGenreFilter && activeGenreFilter.type === type) {
    params.push(`with_genres=${activeGenreFilter.id}`);
  }
  if (activeYearFilter) {
    if (type === "movie") {
      params.push(`primary_release_date.gte=${activeYearFilter.min}-01-01`);
      params.push(`primary_release_date.lte=${activeYearFilter.max}-12-31`);
    } else {
      params.push(`first_air_date.gte=${activeYearFilter.min}-01-01`);
      params.push(`first_air_date.lte=${activeYearFilter.max}-12-31`);
    }
  }
  if (isAsianTab()) {
    const countries = activeCountryFilter ? activeCountryFilter : ASIAN_COUNTRIES.join("|");
    params.push(`with_origin_country=${countries}`);
    // Extra safety net: TMDB's adult flag is unreliable for some regional content,
    // so also require a minimum vote count — low-effort/explicit listings rarely clear this bar.
    if (activeSort !== "rating-desc") params.push(`vote_count.gte=20`);
  }
  return params.join("&");
}

// Safety filters applied after TMDB's include_adult=false protection.
// Keep this focused on clearly adult/explicit content. Generic mature ratings
// such as TV-MA, R, NC-17, or 18+ can mean violence/language/horror and should
// not hide ordinary non-adult movies or shows.
const ANIMATION_GENRE_ID = 16;
const STRICT_SAFE_MODE = true;
const BLOCKED_KEYWORDS = [
  "porn", "pornography", "porno", "erotic", "erotica", "xxx", "hentai", "softcore", "hardcore",
  "nude", "nudity", "stripper", "brothel",
  "prostitute", "prostitution", "playboy", "onlyfans", "camgirl", "av idol", "pink film",
  "色情", "成人", "成人影片", "情色", "裸體", "裸", "エロ", "アダルト", "ポルノ", "성인", "에로",
  "إباحي", "إباحية", "اباحي", "اباحية", "عاري", "عري", "تعري", "إثارة جنسية"
];
const BLOCKED_GENRE_WORDS = ["adult", "erotic", "hentai", "porn", "إباح", "جنسي"];
const BLOCKED_CERTIFICATIONS = ["X", "AO"];
const EXPLICIT_CERTIFICATION_PATTERN = /\b(adult|sex|sexual|nudity|erotic|porn|xxx|hentai)\b|إباح|جنسي|عري|تعري/i;

function contentGenreIds(item) {
  if (Array.isArray(item.genre_ids)) return item.genre_ids.map(Number);
  if (Array.isArray(item.genres)) return item.genres.map(g => Number(g.id));
  return [];
}

function contentGenreNames(item) {
  if (!Array.isArray(item.genres)) return [];
  return item.genres.map(g => String(g.name || "").toLowerCase());
}

function isAnime(item) {
  const isAnimated = contentGenreIds(item).includes(ANIMATION_GENRE_ID);
  const countries = [
    ...(item.origin_country || []),
    ...(item.production_countries || []).map(c => c.iso_3166_1).filter(Boolean)
  ];
  const isAsian = !!ASIAN_LANGUAGE_COUNTRY[item.original_language] ||
    countries.some(country => ASIAN_COUNTRIES.includes(country));
  return isAnimated && isAsian;
}

function normalizeSafeText(value) {
  return String(value || "").toLowerCase().normalize("NFKC");
}

function looksExplicit(item) {
  const text = normalizeSafeText(`${item.title || ""} ${item.name || ""} ${item.original_title || ""} ${item.original_name || ""} ${item.overview || ""} ${item.tagline || ""}`);
  const genreText = contentGenreNames(item).join(" ");
  return BLOCKED_KEYWORDS.some(k => text.includes(normalizeSafeText(k))) ||
    BLOCKED_GENRE_WORDS.some(k => genreText.includes(normalizeSafeText(k)));
}

function hasUnsafeCertification(item) {
  const ratings = [];
  if (item.content_rating) ratings.push(item.content_rating);
  if (item.release_dates?.results) {
    item.release_dates.results.forEach(country => {
      (country.release_dates || []).forEach(r => ratings.push(r.certification));
    });
  }
  if (item.content_ratings?.results) {
    item.content_ratings.results.forEach(r => ratings.push(r.rating));
  }
  return ratings.some(rating => {
    const rawRating = String(rating || "").toLowerCase();
    const normalized = String(rating || "").replace(/\s+/g, "").toUpperCase();
    if (BLOCKED_CERTIFICATIONS.includes(normalized)) return true;
    return EXPLICIT_CERTIFICATION_PATTERN.test(rawRating);
  });
}

function isAllowedContent(item) {
  if (!item) return false;

  // MyDramaList is intentionally unrestricted. Keep all safety restrictions
  // below active for TMDB, TVmaze, and any other source.
  if (itemSource(item) === "mdl") return true;

  if (item.adult === true) return false;
  if (looksExplicit(item)) return false;
  if (hasUnsafeCertification(item)) return false;
  if (STRICT_SAFE_MODE && isAnime(item)) return false;
  return true;
}

function stripHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return div.textContent || "";
}

function tvmazeCountry(show) {
  return show.network?.country?.code || show.webChannel?.country?.code || "";
}

function matchesAsianCountry(item, allowedCountries) {
  if (itemSource(item) === "mdl" && !activeCountryFilter) return true;
  const countries = item.origin_country || [];
  if (countries.some(country => allowedCountries.includes(country))) return true;
  return allowedCountries.includes(ASIAN_LANGUAGE_COUNTRY[item.original_language]);
}

function normalizeTvmazeShow(show) {
  const country = tvmazeCountry(show);
  const languageByCountry = { KR: "ko", JP: "ja", CN: "zh" };
  const languageCodes = { Korean: "ko", Japanese: "ja", Chinese: "zh" };
  const tvmazeGenres = show.genres || [];
  const isAnimated = tvmazeGenres.some(genre =>
    ["anime", "animation"].includes(genre.toLowerCase())
  );
  return {
    id: show.id,
    source: "tvmaze",
    type: "tv",
    name: show.name || "",
    original_name: show.name || "",
    poster_url: show.image?.original || show.image?.medium || null,
    backdrop_url: show.image?.original || null,
    vote_average: show.rating?.average || 0,
    first_air_date: show.premiered || "",
    overview: stripHtml(show.summary),
    genre_ids: isAnimated ? [ANIMATION_GENRE_ID] : [],
    genres: tvmazeGenres.map((name, index) => ({ id: index + 1, name })),
    original_language: languageByCountry[country] || languageCodes[show.language] ||
      (show.language || "").slice(0, 2).toLowerCase(),
    origin_country: country ? [country] : [],
    status: show.status || "",
    in_production: show.status === "Running" || show.status === "To Be Determined",
    episode_run_time: [show.averageRuntime || show.runtime].filter(Boolean),
    number_of_seasons: show._embedded?.episodes?.reduce((max, episode) => Math.max(max, episode.season || 0), 0) || null,
    number_of_episodes: Array.isArray(show._embedded?.episodes) ? show._embedded.episodes.length : null,
    adult: false,
    external_ids: show.externals || {},
    tvmaze_url: show.url || ""
  };
}

function normalizeTvmazeCast(show) {
  return {
    cast: (show._embedded?.cast || []).map(entry => ({
      name: entry.person?.name || "",
      character: entry.character?.name || "",
      profile_url: entry.person?.image?.medium || entry.person?.image?.original || null
    }))
  };
}

function parseMdlRating(value) {
  const rating = parseFloat(String(value || "").replace(/[^\d.]/g, ""));
  return Number.isFinite(rating) ? rating : 0;
}

function mdlCountryCode(country) {
  return {
    "South Korea": "KR",
    Korea: "KR",
    Korean: "KR",
    Japan: "JP",
    Japanese: "JP",
    China: "CN",
    Chinese: "CN",
    Taiwan: "TW",
    Taiwanese: "TW",
    Thailand: "TH",
    Thai: "TH",
    Philippines: "PH",
    Filipino: "PH",
    "Hong Kong": "HK"
  }[country] || "";
}

function normalizeMdlSummary(item) {
  const year = String(item.year || "").match(/\d{4}/)?.[0] || "";
  const mediaType = item.media_type === "movie" ? "movie" : "tv";
  const country = mdlCountryCode(item.country);
  const inferredProductionStatus = mediaType === "movie"
    ? false
    : (year && parseInt(year, 10) < CURRENT_YEAR ? false : null);
  return {
    id: item.slug,
    source: "mdl",
    type: mediaType,
    media_type: mediaType,
    title: mediaType === "movie" ? item.title || "" : undefined,
    name: mediaType === "tv" ? item.title || "" : undefined,
    original_title: mediaType === "movie" ? item.title || "" : undefined,
    original_name: mediaType === "tv" ? item.title || "" : undefined,
    poster_url: item.image || null,
    vote_average: parseMdlRating(item.rating),
    release_date: mediaType === "movie" && year ? `${year}-01-01` : "",
    first_air_date: mediaType === "tv" && year ? `${year}-01-01` : "",
    overview: "",
    genres: [],
    genre_ids: [],
    original_language: "",
    origin_country: country ? [country] : [],
    status: inferredProductionStatus === false ? "Ended" : "",
    in_production: inferredProductionStatus,
    adult: false,
    mdl_url: item.url || (item.slug ? `https://mydramalist.com/${item.slug}` : "")
  };
}

function normalizeMdlDetails(details, fallbackType = "tv") {
  const year = String(details.aired || details.title || "").match(/\d{4}/)?.[0] || "";
  const runtime = parseInt(String(details.duration || "").match(/\d+/)?.[0] || "", 10);
  const country = mdlCountryCode(details.country);
  const mediaType = /\bmovie\b/i.test(details.type || "") ? "movie" : fallbackType;
  const inferredProductionStatus = mediaType === "movie" ? false : inferMdlProductionStatus(details);
  return {
    id: details.slug,
    source: "mdl",
    type: mediaType,
    media_type: mediaType,
    title: mediaType === "movie" ? details.title || "" : undefined,
    name: mediaType === "tv" ? details.title || "" : undefined,
    original_title: mediaType === "movie" ? details.native_title || details.title || "" : undefined,
    original_name: mediaType === "tv" ? details.native_title || details.title || "" : undefined,
    poster_url: details.image || null,
    vote_average: parseMdlRating(details.rating),
    release_date: mediaType === "movie" && year ? `${year}-01-01` : "",
    first_air_date: mediaType === "tv" && year ? `${year}-01-01` : "",
    overview: details.synopsis || "",
    genres: (details.genres || []).map((name, index) => ({ id: 10000 + index, name })),
    genre_ids: [],
    original_language: country === "KR" ? "ko" : country === "JP" ? "ja" : country === "CN" ? "zh" : "",
    origin_country: country ? [country] : [],
    status: inferredProductionStatus === true ? "Returning Series" : inferredProductionStatus === false ? "Ended" : "",
    in_production: inferredProductionStatus,
    episode_run_time: Number.isFinite(runtime) ? [runtime] : [],
    number_of_seasons: 1,
    number_of_episodes: parseInt(details.episodes, 10) || null,
    content_rating: details.content_rating || "",
    adult: false,
    mdl_url: details.url || ""
  };
}

function normalizeMdlCast(data) {
  const grouped = data?.cast || {};
  return {
    cast: Object.values(grouped).flat().map(person => ({
      name: person.name || "",
      character: person.character || "",
      profile_url: person.image || null
    }))
  };
}

function currentQuarter() {
  return Math.floor(new Date().getMonth() / 3) + 1;
}

async function fetchMdlSeasonalShows() {
  if (activeCountryFilter) return [];
  const year = new Date().getFullYear();
  const quarter = currentQuarter();
  const previousQuarter = quarter === 1 ? 4 : quarter - 1;
  const previousYear = quarter === 1 ? year - 1 : year;
  const responses = await Promise.allSettled([
    mdlFetch(`/api/seasonal/${year}/${quarter}`),
    mdlFetch(`/api/seasonal/${previousYear}/${previousQuarter}`)
  ]);
  const items = responses.flatMap(result =>
    result.status === "fulfilled" ? (result.value.dramas || []) : []
  );
  return uniqueItems([], items.map(normalizeMdlSummary)).filter(isAllowedContent);
}

async function fetchMdlCatalog(type, page = 1, signal) {
  // MDL catalog cards do not expose genres; use the structured fallback when
  // a genre filter is active instead of returning misleading results.
  if (activeGenreFilter) return { items: [], hasMore: false };
  const data = await mdlFetch(`/api/catalog/${type}?page=${page}`, { signal });
  let items = (data.results || []).map(normalizeMdlSummary);
  items = filterForCurrentTab(items, type, type === "movie" ? "asianMovies" : "asianTv");
  if (activeYearFilter) {
    items = items.filter(item => {
      const year = parseInt(yearOf(item));
      return year >= activeYearFilter.min && year <= activeYearFilter.max;
    });
  }
  return { items, hasMore: data.has_more === true };
}

async function fetchMdlCatalogBatch(type, startPage = 1, existingItems = [], signal) {
  const TARGET_BATCH_SIZE = 20;
  const MAX_PAGES_PER_BATCH = 15;
  const PARALLEL_PAGE_COUNT = activeCountryFilter || activeYearFilter ? 5 : 1;
  let pageNumber = startPage;
  let lastPage = startPage - 1;
  let hasMore = true;
  let collected = [];
  let scannedPages = 0;

  while (
    hasMore &&
    collected.length < TARGET_BATCH_SIZE &&
    scannedPages < MAX_PAGES_PER_BATCH
  ) {
    const remainingPageSlots = MAX_PAGES_PER_BATCH - scannedPages;
    const pageCount = Math.min(PARALLEL_PAGE_COUNT, remainingPageSlots);
    const requestedPages = Array.from({ length: pageCount }, (_, index) => pageNumber + index);
    const pages = await Promise.all(
      requestedPages.map(requestedPage => fetchMdlCatalog(type, requestedPage, signal))
    );

    for (let index = 0; index < pages.length; index++) {
      const page = pages[index];
      lastPage = requestedPages[index];
      collected.push(...uniqueItems([...existingItems, ...collected], page.items));
      hasMore = page.hasMore;
      scannedPages++;
      if (!hasMore || collected.length >= TARGET_BATCH_SIZE) break;
    }
    pageNumber = lastPage + 1;
  }

  return {
    items: collected,
    hasMore,
    lastPage,
    scannedPages
  };
}

async function searchMdlShows(query, signal, type = "tv") {
  const data = await mdlFetch(`/api/search/q/${encodeURIComponent(query)}`, { signal });
  let items = (data.results || [])
    .map(normalizeMdlSummary)
    .filter(item => item.type === type)
    .filter(isAllowedContent);
  if (activeCountryFilter) {
    items = items.filter(item => item.origin_country.includes(activeCountryFilter));
  }
  return items;
}

function contentMatchKey(item) {
  const title = (item.original_title || item.original_name || item.title || item.name || "")
    .toLowerCase()
    .replace(/[^\p{L}\p{N}]+/gu, "");
  return `${title}:${yearOf(item)}`;
}

function mergeUniqueContent(primary, secondary) {
  const seen = new Set(primary.map(contentMatchKey));
  return [...primary, ...secondary.filter(item => {
    const key = contentMatchKey(item);
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  })];
}

function isoDateDaysAgo(days) {
  const date = new Date();
  date.setDate(date.getDate() - days);
  return date.toISOString().slice(0, 10);
}

async function fetchTvmazeAsianShows() {
  const countries = activeCountryFilter ? [activeCountryFilter] : ASIAN_COUNTRIES;
  const dates = [0, 1, 3, 7].map(isoDateDaysAgo);
  const requests = countries.flatMap(country =>
    dates.map(date => tvmazeFetch(`/schedule?country=${country}&date=${date}`))
  );
  dates.forEach(date => requests.push(tvmazeFetch(`/schedule/web?date=${date}`)));
  const responses = await Promise.allSettled(requests);
  const shows = responses.flatMap(result =>
    result.status === "fulfilled" ? result.value.map(episode => episode.show).filter(Boolean) : []
  );
  const unique = new Map();
  shows.forEach(show => {
    const normalized = normalizeTvmazeShow(show);
    if (matchesAsianCountry(normalized, countries)) unique.set(show.id, normalized);
  });
  return [...unique.values()]
    .filter(isAllowedContent)
    .filter(item => {
      if (!activeYearFilter) return true;
      const year = parseInt(yearOf(item));
      return year >= activeYearFilter.min && year <= activeYearFilter.max;
    })
    .sort((a, b) => (b.vote_average || 0) - (a.vote_average || 0));
}

async function searchTvmazeAsianShows(query, signal) {
  const results = await tvmazeFetch(`/search/shows?q=${encodeURIComponent(query)}`, { signal });
  const allowedCountries = activeCountryFilter ? [activeCountryFilter] : ASIAN_COUNTRIES;
  return results
    .map(result => normalizeTvmazeShow(result.show))
    .filter(item => matchesAsianCountry(item, allowedCountries))
    .filter(isAllowedContent);
}

async function refreshStoredContent(collection, save) {
  const refreshed = await Promise.all(collection.map(async item => {
    if ((item.genre_ids?.length || itemSource(item) === "tvmaze") && item.original_language) return item;
    try {
      let details;
      if (itemSource(item) === "tvmaze") {
        details = normalizeTvmazeShow(await tvmazeFetch(`/shows/${item.id}`));
      } else if (itemSource(item) === "mdl") {
        details = normalizeMdlDetails(await mdlFetch(`/api/id/${item.id}`), item.type);
      } else {
        const [englishDetails, arabicDetails] = await Promise.all([
          tmdbFetch(`/${item.type}/${item.id}?language=en-US`),
          tmdbFetch(`/${item.type}/${item.id}?language=ar`)
        ]);
        details = applyArabicTitle(englishDetails, arabicDetails);
      }
      return {
        ...item,
        ...details,
        adult: details.adult === true,
        genre_ids: contentGenreIds(details),
        original_language: details.original_language || "",
        origin_country: details.origin_country || []
      };
    } catch(e) {
      return item;
    }
  }));
  const allowed = refreshed.filter(isAllowedContent);
  collection.splice(0, collection.length, ...allowed);
  save();
  return allowed;
}

function parseCsvRows(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let quoted = false;
  const value = String(text || "").replace(/^\uFEFF/, "");
  for (let i = 0; i < value.length; i++) {
    const ch = value[i];
    const next = value[i + 1];
    if (ch === '"' && quoted && next === '"') {
      cell += '"';
      i++;
    } else if (ch === '"') {
      quoted = !quoted;
    } else if (ch === "," && !quoted) {
      row.push(cell);
      cell = "";
    } else if ((ch === "\n" || ch === "\r") && !quoted) {
      if (ch === "\r" && next === "\n") i++;
      row.push(cell);
      if (row.some(part => String(part).trim() !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }
  row.push(cell);
  if (row.some(part => String(part).trim() !== "")) rows.push(row);
  return rows;
}

function normalizeImportHeader(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[\s_-]+/g, "")
    .replace(/[^\p{L}\p{N}]/gu, "");
}

function importRowValue(row, names) {
  const normalizedNames = names.map(normalizeImportHeader);
  for (const [key, value] of Object.entries(row || {})) {
    if (normalizedNames.includes(normalizeImportHeader(key))) return String(value || "").trim();
  }
  return "";
}

function parseImportDate(value) {
  const raw = String(value || "").trim();
  if (!raw) return new Date().toISOString();
  const direct = Date.parse(raw);
  if (Number.isFinite(direct)) return new Date(direct).toISOString();
  const parts = raw.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);
  if (parts) {
    const first = parseInt(parts[1], 10);
    const second = parseInt(parts[2], 10);
    const year = parseInt(parts[3].length === 2 ? `20${parts[3]}` : parts[3], 10);
    const month = first > 12 ? second - 1 : first - 1;
    const day = first > 12 ? first : second;
    const parsed = new Date(Date.UTC(year, month, day));
    if (Number.isFinite(parsed.getTime())) return parsed.toISOString();
  }
  return new Date().toISOString();
}

function cleanImportedTitle(raw) {
  const original = String(raw || "").replace(/\s+/g, " ").trim();
  if (!original) return { title: "", type: "", rawTitle: "" };
  const parts = original.split(":").map(part => part.trim()).filter(Boolean);
  const likelyEpisode = parts.length >= 2 && /(season|series|limited series|collection|book|part|volume|episode|الحلقة|الموسم|جزء|حلقة)\s*\d*/i.test(parts[1]);
  const title = likelyEpisode ? parts[0] : original
    .replace(/\s+\((19|20)\d{2}\)\s*$/g, "")
    .trim();
  return { title, type: likelyEpisode ? "tv" : "", rawTitle: original };
}

function normalizeImportType(value) {
  const type = String(value || "").trim().toLowerCase();
  if (/^(movie|film|فيلم|افلام|أفلام)$/.test(type)) return "movie";
  if (/^(tv|show|series|drama|مسلسل|مسلسلات|برنامج)$/.test(type)) return "tv";
  return "";
}

function isLetterboxdImportRow(entry) {
  return Object.keys(entry || {}).some(key => normalizeImportHeader(key) === "letterboxduri");
}

function importCandidatesFromObjects(items, context = {}) {
  return (items || []).map(entry => {
    const isLetterboxd = context.sourceFormat === "letterboxd" || isLetterboxdImportRow(entry);
    const titleValue = importRowValue(entry, ["title", "name", "movie", "show", "series", "العنوان", "الاسم"]);
    const cleaned = cleanImportedTitle(titleValue);
    const explicitType = normalizeImportType(importRowValue(entry, ["type", "media_type", "kind", "category", "النوع"]));
    const year = String(importRowValue(entry, ["year", "release_year", "releaseYear", "سنة", "السنة"])).match(/\d{4}/)?.[0] || "";
    const watchedAt = parseImportDate(importRowValue(entry, ["watched_at", "watchedAt", "watch_date", "watched date", "date", "تاريخ"]));
    return {
      rawTitle: cleaned.rawTitle || titleValue,
      title: cleaned.title,
      year,
      type: explicitType || cleaned.type || (isLetterboxd ? "movie" : ""),
      sourceFormat: isLetterboxd ? "letterboxd" : (context.sourceFormat || ""),
      sourceUri: importRowValue(entry, ["letterboxd uri", "letterboxd_uri", "url", "uri", "link"]),
      watchedAt,
      status: "pending",
      reason: "بانتظار المطابقة"
    };
  }).filter(candidate => candidate.title);
}

function parseHistoryImportFile(text, filename = "") {
  const raw = String(text || "").trim();
  if (!raw) return [];
  if (/\.json$/i.test(filename) || raw.startsWith("[") || raw.startsWith("{")) {
    const parsed = JSON.parse(raw);
    const items = Array.isArray(parsed) ? parsed : (parsed.history || parsed.items || parsed.results || []);
    return importCandidatesFromObjects(items);
  }
  const rows = parseCsvRows(raw);
  if (!rows.length) return [];
  const headers = rows[0].map(header => String(header || "").trim());
  const normalizedHeaders = headers.map(normalizeImportHeader);
  const sourceFormat = normalizedHeaders.includes("letterboxduri") ? "letterboxd" : "";
  const hasHeader = normalizedHeaders.some(header =>
    ["title", "name", "date", "watcheddate", "watchedat", "type", "year", "letterboxduri"].includes(header)
  );
  const dataRows = hasHeader ? rows.slice(1) : rows;
  const objects = dataRows.map(row => {
    if (hasHeader) {
      return headers.reduce((obj, header, index) => {
        obj[header || `col${index}`] = row[index] || "";
        return obj;
      }, {});
    }
    return { title: row[0] || "", watched_at: row[1] || "", type: row[2] || "", year: row[3] || "" };
  });
  return importCandidatesFromObjects(objects, { sourceFormat });
}

function historyImportConfidence(item, candidate) {
  const wanted = simpleTitleKey(candidate.title);
  const titles = [
    getDisplayTitle(item),
    item.original_title,
    item.original_name,
    getArabicTitle(item)
  ].map(simpleTitleKey).filter(Boolean);
  const wantedYear = parseInt(candidate.year || "", 10);
  const foundYear = parseInt(yearOf(item), 10);
  let score = 0;
  if (wanted && titles.some(title => title === wanted)) score += 100;
  else if (wanted && titles.some(title => title.startsWith(wanted) || wanted.startsWith(title))) score += 74;
  else if (wanted && titles.some(title => title.includes(wanted) || wanted.includes(title))) score += 58;
  else if (wanted) {
    const wantedTokens = new Set(wanted.match(/[\p{L}\p{N}]+/gu) || []);
    const bestOverlap = Math.max(0, ...titles.map(title => {
      const tokens = new Set(title.match(/[\p{L}\p{N}]+/gu) || []);
      let overlap = 0;
      wantedTokens.forEach(token => { if (tokens.has(token)) overlap++; });
      return wantedTokens.size ? overlap / wantedTokens.size : 0;
    }));
    score += bestOverlap * 45;
  }
  if (wanted.length <= 3 && !titles.includes(wanted)) score = Math.min(score, 35);
  if (Number.isFinite(wantedYear) && Number.isFinite(foundYear)) {
    const delta = Math.abs(wantedYear - foundYear);
    if (delta === 0) score += 20;
    else if (delta === 1) score += 8;
    else score -= 35;
  }
  if (candidate.type && (item.media_type || item.type) === candidate.type) score += candidate.sourceFormat === "letterboxd" ? 12 : 8;
  score += Math.min(item.vote_average || 0, 10) / 4;
  return score;
}

async function resolveHistoryImportCandidate(candidate) {
  const rec = {
    title: candidate.title,
    year: candidate.year,
    search_query: candidate.title,
    type: candidate.type || "",
    source_hint: candidate.sourceFormat === "letterboxd" ? "tmdb movie" : "",
    append_year_to_query: false
  };
  const jobs = [];
  const shouldTryMovie = !candidate.type || candidate.type === "movie" || candidate.sourceFormat === "letterboxd";
  const shouldTryTv = !candidate.type || candidate.type === "tv" || candidate.sourceFormat === "letterboxd";
  if (shouldTryMovie) jobs.push(searchTmdbForRecommendation({ ...rec, type: "movie" }, "movie"));
  if (shouldTryTv) {
    jobs.push(searchTmdbForRecommendation({ ...rec, type: "tv" }, "tv"));
    if (candidate.sourceFormat !== "letterboxd") {
      jobs.push(searchMdlForRecommendation({ ...rec, type: "tv", source_hint: "mdl" }, "tv"));
      jobs.push(searchTvmazeForRecommendation({ ...rec, type: "tv" }));
    }
  }
  const results = (await Promise.allSettled(jobs))
    .filter(result => result.status === "fulfilled" && result.value)
    .map(result => result.value);
  const ranked = results
    .map(item => ({
      item,
      type: item.media_type || item.type || candidate.type || "movie",
      confidence: historyImportConfidence(item, candidate)
    }))
    .sort((a, b) => b.confidence - a.confidence);
  const best = ranked[0];
  if (!best || best.confidence < 76) return null;
  return best;
}

function historyImportPreviewHtml() {
  if (!historyImportCandidates.length) return "";
  const matched = historyImportCandidates.filter(candidate => candidate.status === "matched").length;
  const failed = historyImportCandidates.filter(candidate => candidate.status === "fail").length;
  const pending = historyImportCandidates.filter(candidate => candidate.status === "pending").length;
  const rows = historyImportCandidates.slice(0, 40).map(candidate => {
    const title = candidate.item ? getDisplayTitle(candidate.item) : candidate.rawTitle || candidate.title;
    const badgeClass = candidate.status === "matched" ? "ok" : candidate.status === "fail" ? "fail" : "";
    const label = candidate.status === "matched" ? "مطابق" : candidate.status === "fail" ? "غير مطابق" : "جاري";
    const meta = candidate.status === "matched"
      ? `${candidate.type === "tv" ? "مسلسل" : "فيلم"} · ${itemSource(candidate.item)} · ${yearOf(candidate.item)}`
      : candidate.reason;
    return `
      <div class="history-import-row">
        <strong>${escapeHtml(title)}</strong>
        <span>${escapeHtml(meta || "")}</span>
        <em class="history-import-badge ${badgeClass}">${label}</em>
      </div>
    `;
  }).join("");
  const extra = historyImportCandidates.length > 40
    ? `<div class="history-import-note">تم عرض أول 40 نتيجة فقط من أصل ${historyImportCandidates.length}.</div>`
    : "";
  return `
    <div class="history-import-preview" id="historyImportPreview">
      <div class="history-import-note">مطابق: ${matched} · غير مطابق: ${failed} · قيد المعالجة: ${pending}</div>
      ${rows}
      ${extra}
    </div>
  `;
}

async function handleHistoryImportFile(file) {
  if (!file) return;
  historyImportCandidates = [];
  refreshHistoryImportPanel("جاري قراءة الملف...");
  try {
    const text = await file.text();
    historyImportCandidates = parseHistoryImportFile(text, file.name).slice(0, 500);
    if (!historyImportCandidates.length) {
      refreshHistoryImportPanel("لم أجد عناوين قابلة للاستيراد داخل الملف.");
      return;
    }
    refreshHistoryImportPanel("جاري مطابقة العناوين مع المصادر...");
    let processed = 0;
    const workerCount = Math.min(4, historyImportCandidates.length);
    let cursor = 0;
    async function processNextImportCandidate() {
      const index = cursor++;
      if (index >= historyImportCandidates.length) return;
      const candidate = historyImportCandidates[index];
      try {
        const resolved = await resolveHistoryImportCandidate(candidate);
        if (resolved) {
          candidate.item = resolved.item;
          candidate.type = resolved.type;
          candidate.status = "matched";
          candidate.reason = "";
        } else {
          candidate.status = "fail";
          candidate.reason = "لم أجد نتيجة موثوقة";
        }
      } catch(e) {
        candidate.status = "fail";
        candidate.reason = "تعذرت المطابقة";
      }
      processed++;
      if (processed % 10 === 0 || processed === historyImportCandidates.length) {
        refreshHistoryImportPanel(`تمت معالجة ${processed} من ${historyImportCandidates.length}.`);
      }
      await processNextImportCandidate();
    }
    await Promise.all(Array.from({ length: workerCount }, () => processNextImportCandidate()));
    refreshHistoryImportPanel("انتهت المطابقة. راجع النتائج ثم اعتمد المطابق منها.");
  } catch(e) {
    historyImportCandidates = [];
    refreshHistoryImportPanel("تعذرت قراءة الملف. تأكد أنه CSV أو JSON صحيح.");
  }
}

function bindHistoryImportControls() {
  const input = document.getElementById("historyImportFile");
  const pickBtn = document.getElementById("historyImportPickBtn");
  const applyBtn = document.getElementById("historyImportApplyBtn");
  const clearBtn = document.getElementById("historyImportClearBtn");
  if (pickBtn && input) {
    pickBtn.addEventListener("click", () => input.click());
    input.addEventListener("change", () => handleHistoryImportFile(input.files?.[0]));
  }
  if (applyBtn) {
    applyBtn.addEventListener("click", async () => {
      const matched = historyImportCandidates.filter(candidate => candidate.status === "matched" && candidate.item);
      let added = 0;
      matched.forEach(candidate => {
        if (addImportedWatchItem(candidate.item, candidate.type, candidate.watchedAt)) added++;
      });
      saveWatchHistory();
      historyImportCandidates = [];
      await renderHistory();
      refreshHistoryImportPanel(`تم استيراد ${added} عنوان جديد. تم تجاهل الموجود سابقاً تلقائياً.`);
    });
  }
  if (clearBtn) {
    clearBtn.addEventListener("click", () => {
      historyImportCandidates = [];
      refreshHistoryImportPanel();
    });
  }
}

function trackerShowKey(show) {
  const imdb = String(show?.id?.imdb || show?.imdb_id || "").trim();
  const tvdb = String(show?.id?.tvdb || show?.tvdb_id || "").trim();
  const uuid = String(show?.uuid || show?.series_uuid || "").trim();
  const title = simpleTitleKey(show?.title || show?.name || "");
  if (imdb) return `imdb:${imdb}`;
  if (tvdb) return `tvdb:${tvdb}`;
  if (uuid) return `uuid:${uuid}`;
  return `title:${title}`;
}

function cleanTvTimeTitle(title) {
  return String(title || "").replace(/\s+/g, " ").trim();
}

function tvTimeYear(title) {
  return String(title || "").match(/\((19|20)\d{2}\)/)?.[0]?.replace(/[()]/g, "") || "";
}

function tvTimeBaseTitle(title) {
  return cleanTvTimeTitle(title).replace(/\s+\((19|20)\d{2}\)\s*$/, "").trim();
}

function normalizeTvTimeEpisode(episode, seasonNumber, seasonIsSpecials = false) {
  const watchedAt = episode.watched_at || episode.watchedAt || "";
  const isWatched = episode.is_watched === true || String(episode.is_watched).toLowerCase() === "true" || !!watchedAt;
  return {
    season: parseInt(episode.season ?? seasonNumber, 10) || 0,
    episode: parseInt(episode.episode ?? episode.number, 10) || 0,
    name: cleanTvTimeTitle(episode.name || episode.title || ""),
    tvdb_id: String(episode.tvdb_id || episode.id?.tvdb || "").trim(),
    imdb_id: String(episode.imdb_id || episode.id?.imdb || "").trim(),
    special: episode.special === true || seasonIsSpecials === true || String(episode.special).toLowerCase() === "true",
    is_watched: isWatched,
    watched_at: watchedAt || "",
    rewatch_count: parseInt(episode.rewatch_count ?? episode.rewatchCount ?? 0, 10) || 0,
    watched_count: parseInt(episode.watched_count ?? episode.watchedCount ?? (isWatched ? 1 : 0), 10) || 0
  };
}

function normalizeTvTimeSeriesRecord(raw) {
  const title = cleanTvTimeTitle(raw.title || raw.name || "");
  const episodes = [];
  (raw.seasons || []).forEach(season => {
    const seasonNumber = parseInt(season.number ?? season.season, 10) || 0;
    const seasonIsSpecials = season.is_specials === true || String(season.is_specials).toLowerCase() === "true";
    (season.episodes || []).forEach(episode => {
      const normalized = normalizeTvTimeEpisode(episode, seasonNumber, seasonIsSpecials);
      if (normalized.season > 0 && normalized.episode > 0) episodes.push(normalized);
    });
  });
  episodes.sort((a, b) => a.season - b.season || a.episode - b.episode);
  const show = {
    key: trackerShowKey(raw),
    uuid: raw.uuid || "",
    tvdb_id: String(raw.id?.tvdb || raw.tvdb_id || "").trim(),
    imdb_id: String(raw.id?.imdb || raw.imdb_id || "").trim(),
    tmdb_id: raw.tmdb_id || null,
    title,
    display_title: tvTimeBaseTitle(title),
    year: raw.year || tvTimeYear(title),
    status: raw.status || "",
    is_favorite: raw.is_favorite === true,
    poster_url: raw.poster_url || raw.poster || "",
    backdrop_url: raw.backdrop_url || "",
    created_at: raw.created_at || "",
    imported_from: "TV Time",
    episodes
  };
  return recalcTrackerShow(show);
}

function normalizeTvTimeMovieRecord(raw) {
  return {
    uuid: raw.uuid || "",
    tvdb_id: String(raw.id?.tvdb || raw.tvdb_id || "").trim(),
    imdb_id: String(raw.id?.imdb || raw.imdb_id || "").trim(),
    title: cleanTvTimeTitle(raw.title || raw.name || ""),
    year: raw.year || "",
    is_watched: raw.is_watched === true || String(raw.is_watched).toLowerCase() === "true",
    watched_at: raw.watched_at || "",
    rewatch_count: parseInt(raw.rewatch_count ?? 0, 10) || 0
  };
}

function recalcTrackerShow(show) {
  if (!show) return null;
  const episodes = (show.episodes || [])
    .filter(ep => Number.isFinite(Number(ep.season)) && Number.isFinite(Number(ep.episode)))
    .sort((a, b) => a.season - b.season || a.episode - b.episode);
  const total = episodes.length;
  const watched = episodes.filter(ep => ep.is_watched).length;
  const percent = total ? Math.round((watched / total) * 100) : 0;
  const watchedDates = episodes
    .filter(ep => ep.is_watched && ep.watched_at)
    .map(ep => Date.parse(ep.watched_at))
    .filter(Number.isFinite)
    .sort((a, b) => b - a);
  return {
    ...show,
    episodes,
    progress: { total, watched, remaining: Math.max(0, total - watched), percent },
    last_watched_at: watchedDates.length ? new Date(watchedDates[0]).toISOString() : "",
    next_episode: episodes.find(ep => !ep.is_watched) || null
  };
}

function trackerStats() {
  const shows = episodeTracking.shows || [];
  const totalEpisodes = shows.reduce((sum, show) => sum + (show.progress?.total || 0), 0);
  const watchedEpisodes = shows.reduce((sum, show) => sum + (show.progress?.watched || 0), 0);
  const activeShows = shows.filter(show => (show.progress?.watched || 0) > 0 && (show.progress?.remaining || 0) > 0).length;
  const completedShows = shows.filter(show => (show.progress?.total || 0) > 0 && (show.progress?.remaining || 0) === 0).length;
  const missingArtwork = shows.filter(show => !show.poster_url && !show.backdrop_url).length;
  return { shows: shows.length, totalEpisodes, watchedEpisodes, activeShows, completedShows, missingArtwork };
}

function trackerIsStale(show) {
  if (!show.last_watched_at || !(show.progress?.remaining > 0)) return false;
  const days = (Date.now() - Date.parse(show.last_watched_at)) / 86400000;
  return Number.isFinite(days) && days >= 45;
}

function trackerFilteredShows(view = activeTrackerView) {
  const shows = (episodeTracking.shows || []).map(recalcTrackerShow);
  const filtered = shows.filter(show => {
    const watched = show.progress?.watched || 0;
    const remaining = show.progress?.remaining || 0;
    if (view === "completed") return watched > 0 && remaining === 0;
    if (view === "notStarted") return watched === 0;
    if (view === "stale") return trackerIsStale(show);
    if (view === "upcoming") return remaining > 0;
    if (view === "all") return true;
    return watched > 0 && remaining > 0;
  });
  return filtered.sort((a, b) => {
    if (view === "notStarted") return (Date.parse(b.created_at) || 0) - (Date.parse(a.created_at) || 0) || a.display_title.localeCompare(b.display_title);
    if (view === "completed") return (Date.parse(b.last_watched_at) || 0) - (Date.parse(a.last_watched_at) || 0) || a.display_title.localeCompare(b.display_title);
    return (Date.parse(b.last_watched_at) || 0) - (Date.parse(a.last_watched_at) || 0) ||
      (b.progress?.remaining || 0) - (a.progress?.remaining || 0) ||
      a.display_title.localeCompare(b.display_title);
  });
}

    pickFolder.addEventListener("click", () => {
      input.setAttribute("webkitdirectory", "");
      input.setAttribute("directory", "");
      input.click();
    });
  }
  if (pickFiles && input) {
    pickFiles.addEventListener("click", () => {
      input.removeAttribute("webkitdirectory");
      input.removeAttribute("directory");
      input.click();
    });
  }
  if (clearBtn) {
    clearBtn.addEventListener("click", () => {
      episodeTracking = { shows: [], movies: [], lists: [], imported_at: "", source: "" };
      trackerImportMessage = "تم مسح تتبع الحلقات فقط.";
      saveEpisodeTracking();
      renderEpisodeTracker();
    });
  }
  if (hydrateBtn) {
    hydrateBtn.addEventListener("click", () => {
      trackerImportMessage = "جاري تحميل صور ومعلومات المسلسلات الناقصة على دفعات...";
      renderEpisodeTracker();
      hydrateTrackerPostersSoon({ limit: 60, continueAll: true, force: true });
    });
  }
}

function csvObjectsFromText(text) {
  const rows = parseCsvRows(text);
  if (!rows.length) return [];
  const headers = rows[0].map(header => String(header || "").trim());
  return rows.slice(1).map(row => headers.reduce((obj, header, index) => {
    obj[header || `col${index}`] = row[index] || "";
    return obj;
  }, {}));
}

function showsFromTvTimeEpisodesCsv(text) {
  const groups = new Map();
  csvObjectsFromText(text).forEach(row => {
    const title = importRowValue(row, ["title"]);
    if (!title) return;
    const seriesUuid = importRowValue(row, ["series_uuid"]);
    const tvdb = importRowValue(row, ["series_tvdb_id"]);
    const imdb = importRowValue(row, ["series_imdb_id"]);
    const key = imdb ? `imdb:${imdb}` : tvdb ? `tvdb:${tvdb}` : seriesUuid ? `uuid:${seriesUuid}` : `title:${simpleTitleKey(title)}`;
    if (!groups.has(key)) {
      groups.set(key, {
        uuid: seriesUuid,
        id: { tvdb, imdb },
        title,
        seasons: []
      });
    }
    const show = groups.get(key);
    const seasonNumber = parseInt(importRowValue(row, ["season"]), 10) || 0;
    let season = show.seasons.find(existing => existing.number === seasonNumber);
    if (!season) {
      season = { number: seasonNumber, episodes: [] };
      show.seasons.push(season);
    }
    season.episodes.push({
      number: parseInt(importRowValue(row, ["episode"]), 10) || 0,
      tvdb_id: importRowValue(row, ["tvdb_id"]),
      is_watched: importRowValue(row, ["is_watched"]),
      watched_at: importRowValue(row, ["watched_at"]),
      rewatch_count: importRowValue(row, ["rewatch_count"]),
      special: importRowValue(row, ["special"])
    });
  });
  return [...groups.values()].map(normalizeTvTimeSeriesRecord);
}

function mergeTrackerShows(existingShows, importedShows) {
  const byKey = new Map((existingShows || []).map(show => [show.key, show]));
  importedShows.forEach(show => {
    const existing = byKey.get(show.key);
    if (!existing) {
      byKey.set(show.key, recalcTrackerShow(show));
      return;
    }
    const episodeMap = new Map((existing.episodes || []).map(ep => [`${ep.season}:${ep.episode}`, ep]));
    (show.episodes || []).forEach(ep => {
      const key = `${ep.season}:${ep.episode}`;
      const old = episodeMap.get(key);
      episodeMap.set(key, old ? { ...old, ...ep, is_watched: old.is_watched || ep.is_watched, watched_at: old.watched_at || ep.watched_at } : ep);
    });
    byKey.set(show.key, recalcTrackerShow({
      ...existing,
      ...show,
      poster_url: existing.poster_url || show.poster_url,
      backdrop_url: existing.backdrop_url || show.backdrop_url,
      episodes: [...episodeMap.values()]
    }));
  });
  return [...byKey.values()].map(recalcTrackerShow);
}

async function handleTvTimeImportFiles(fileList) {
  const files = [...(fileList || [])];
  if (!files.length) return;
  trackerImportMessage = "جاري قراءة ملفات TV Time...";
  renderEpisodeTracker();
  try {
    const readFiles = await Promise.all(files.map(async file => ({
      name: file.name,
      path: file.webkitRelativePath || file.name,
      text: await file.text()
    })));
    const jsonFiles = [];
    const csvFiles = [];
    readFiles.forEach(file => {
      const trimmed = file.text.trim();
      if (/\.json$/i.test(file.name) || trimmed.startsWith("[") || trimmed.startsWith("{")) jsonFiles.push(file);
      else if (/\.csv$/i.test(file.name)) csvFiles.push(file);
    });

    const importedShows = [];
    let importedMovies = [];
    let importedLists = [];

    jsonFiles.forEach(file => {
      const data = JSON.parse(file.text);
      const lowerName = file.name.toLowerCase();
      if (lowerName.includes("series") && !lowerName.includes("episodes") && Array.isArray(data)) {
        importedShows.push(...data.map(normalizeTvTimeSeriesRecord).filter(show => show.title));
      } else if (lowerName.includes("movies") && Array.isArray(data)) {
        importedMovies = data.map(normalizeTvTimeMovieRecord).filter(movie => movie.title);
      } else if (lowerName.includes("lists") && Array.isArray(data)) {
        importedLists = data;
      }
    });

    if (!importedShows.length) {
      csvFiles
        .filter(file => file.name.toLowerCase().includes("series-episodes"))
        .forEach(file => importedShows.push(...showsFromTvTimeEpisodesCsv(file.text)));
    }

    if (!importedMovies.length) {
      const movieCsv = csvFiles.find(file => file.name.toLowerCase().includes("movies"));
      if (movieCsv) importedMovies = csvObjectsFromText(movieCsv.text).map(row => normalizeTvTimeMovieRecord(row)).filter(movie => movie.title);
    }

    if (!importedLists.length) {
      const listsCsv = csvFiles.find(file => file.name.toLowerCase().includes("lists"));
      if (listsCsv) importedLists = csvObjectsFromText(listsCsv.text);
    }

    if (!importedShows.length && !importedMovies.length && !importedLists.length) {
      trackerImportMessage = "لم أجد بيانات TV Time قابلة للاستيراد داخل الملفات المختارة.";
      renderEpisodeTracker();
      return;
    }

    episodeTracking = {
      shows: mergeTrackerShows(episodeTracking.shows, importedShows),
      movies: importedMovies.length ? importedMovies : (episodeTracking.movies || []),
      lists: importedLists.length ? importedLists : (episodeTracking.lists || []),
      imported_at: new Date().toISOString(),
      source: "TV Time export"
    };
    saveEpisodeTracking();
    trackerHydrationInProgress = false;
    trackerHydrationContinue = false;
    const stats = trackerStats();
    trackerImportMessage = `تم استيراد ${stats.shows} مسلسل، ${stats.watchedEpisodes} حلقة مشاهدة، ${episodeTracking.movies.length} فيلم، و ${episodeTracking.lists.length} قائمة من TV Time.`;
    renderEpisodeTracker();
  } catch(e) {
    trackerImportMessage = "تعذر استيراد TV Time. تأكد من اختيار مجلد التصدير أو ملفات JSON/CSV الأصلية.";
    renderEpisodeTracker();
  }
}

function trackerShowByKey(key) {
  return (episodeTracking.shows || []).find(show => show.key === key);
}

function trackerEpisodeCode(ep) {
  return `S${String(ep.season).padStart(2, "0")} | E${String(ep.episode).padStart(2, "0")}`;
}

function updateTrackerShow(show) {
  const index = episodeTracking.shows.findIndex(item => item.key === show.key);
  if (index >= 0) episodeTracking.shows[index] = recalcTrackerShow(show);
  saveEpisodeTracking();
}

function toggleTrackerEpisode(showKey, season, episode, forceWatched = null) {
  const show = trackerShowByKey(showKey);
  if (!show) return;
  const target = show.episodes.find(ep => ep.season === season && ep.episode === episode);
  if (!target) return;
  const nextState = forceWatched === null ? !target.is_watched : !!forceWatched;
  target.is_watched = nextState;
  target.watched_at = nextState ? (target.watched_at || new Date().toISOString()) : "";
  target.watched_count = nextState ? Math.max(1, target.watched_count || 1) : 0;
  updateTrackerShow(show);
}

function markTrackerNext(showKey) {
  const show = recalcTrackerShow(trackerShowByKey(showKey));
  if (!show?.next_episode) return;
  toggleTrackerEpisode(showKey, show.next_episode.season, show.next_episode.episode, true);
}

function setTrackerShowWatched(showKey, watched) {
  const show = trackerShowByKey(showKey);
  if (!show) return;
  const now = new Date().toISOString();
  show.episodes.forEach(ep => {
    ep.is_watched = !!watched;
    ep.watched_at = watched ? (ep.watched_at || now) : "";
    ep.watched_count = watched ? Math.max(1, ep.watched_count || 1) : 0;
  });
  updateTrackerShow(show);
}

async function hydrateTrackerPostersSoon(options = {}) {
  if (!(episodeTracking.shows || []).length) return;
  if (trackerHydrationInProgress && !options.force) return;
  scheduleIdleWork(() => hydrateTrackerPosters(options), 1000);
}

function trackerMissingArtworkShows() {
  return (episodeTracking.shows || [])
    .filter(show => !show.poster_url && !show.backdrop_url)
    .sort((a, b) => {
      const aVisible = trackerFilteredShows(activeTrackerView).some(show => show.key === a.key) ? 1 : 0;
      const bVisible = trackerFilteredShows(activeTrackerView).some(show => show.key === b.key) ? 1 : 0;
      return bVisible - aVisible || (b.progress?.watched || 0) - (a.progress?.watched || 0);
    });
}

async function findTmdbTrackerMatch(show) {
  const imdbId = String(show.imdb_id || "").trim();
  const tvdbId = String(show.tvdb_id || "").trim();
  const externalLookups = [];
  if (/^tt\d+$/i.test(imdbId)) externalLookups.push(`/find/${encodeURIComponent(imdbId)}?external_source=imdb_id&language=en-US`);
  if (/^\d+$/.test(tvdbId)) externalLookups.push(`/find/${encodeURIComponent(tvdbId)}?external_source=tvdb_id&language=en-US`);

  for (const endpoint of externalLookups) {
    const data = await tmdbFetch(endpoint).catch(() => null);
    const result = (data?.tv_results || [])[0];
    if (result) return result;
  }

  const query = encodeURIComponent(show.display_title || tvTimeBaseTitle(show.title));
  const baseEndpoint = `/search/tv?language=en-US&query=${query}`;
  const endpoints = show.year
    ? [`${baseEndpoint}&first_air_date_year=${encodeURIComponent(show.year)}`, baseEndpoint]
    : [baseEndpoint];

  for (const endpoint of endpoints) {
    const data = await tmdbFetch(endpoint).catch(() => null);
    const results = data?.results || [];
    if (!results.length) continue;
    const key = simpleTitleKey(show.display_title || show.title);
    return results.sort((a, b) => {
      const aTitle = simpleTitleKey(a.name || a.original_name);
      const bTitle = simpleTitleKey(b.name || b.original_name);
      const aScore =
        (aTitle === key ? 70 : 0) +
        (aTitle.includes(key) || key.includes(aTitle) ? 18 : 0) +
        (show.year && yearOf(a) === show.year ? 20 : 0) +
        (a.popularity || 0);
      const bScore =
        (bTitle === key ? 70 : 0) +
        (bTitle.includes(key) || key.includes(bTitle) ? 18 : 0) +
        (show.year && yearOf(b) === show.year ? 20 : 0) +
        (b.popularity || 0);
      return bScore - aScore;
    })[0];
  }
  return null;
}

function applyTrackerTmdbMetadata(show, result) {
  if (!show || !result) return false;
  let changed = false;
  if (!show.tmdb_id && result.id) {
    show.tmdb_id = result.id;
    changed = true;
  }
  if (!show.poster_url && result.poster_path) {
    show.poster_url = `${IMG_BASE}${result.poster_path}`;
    changed = true;
  }
  if (!show.backdrop_url && result.backdrop_path) {
    show.backdrop_url = `${BACKDROP_BASE}${result.backdrop_path}`;
    changed = true;
  }
  if (!show.overview && result.overview) {
    show.overview = String(result.overview).slice(0, 700);
    changed = true;
  }
  if (!show.year && yearOf(result) !== "—") {
    show.year = yearOf(result);
    changed = true;
  }
  if (!show.tmdb_title && (result.name || result.original_name)) {
    show.tmdb_title = result.name || result.original_name;
    changed = true;
  }
  return changed;
}

async function hydrateTrackerPosters(options = {}) {
  if (trackerHydrationInProgress && !options.force) return;
  const limit = options.limit || 30;
  const continueAll = !!options.continueAll;
  const missing = trackerMissingArtworkShows().slice(0, limit);
  if (!missing.length) {
    trackerImportMessage = episodeTracking.shows?.length ? "كل الصور المتاحة تم تحميلها أو لم نجد لها تطابقاً موثوقاً." : "";
    if (currentTab === "episodeTracker") renderEpisodeTracker();
    return;
  }

  trackerHydrationInProgress = true;
  trackerHydrationContinue = continueAll;
  let changed = false;
  let processed = 0;
  for (const show of missing) {
    try {
      const result = await findTmdbTrackerMatch(show);
      const stored = trackerShowByKey(show.key);
      if (stored && applyTrackerTmdbMetadata(stored, result)) changed = true;
    } catch(e) {}
    processed++;
  }
  trackerHydrationInProgress = false;
  if (changed) saveEpisodeTracking();

  const remaining = trackerStats().missingArtwork;
  if (remaining > 0 && trackerHydrationContinue && currentTab === "episodeTracker") {
    trackerImportMessage = `تمت معالجة ${processed} مسلسل. المتبقي بدون صور: ${remaining}. جاري الاستكمال...`;
    renderEpisodeTracker();
    setTimeout(() => hydrateTrackerPosters({ limit, continueAll: true }), 900);
    return;
  }

  if (currentTab === "episodeTracker") {
    trackerImportMessage = remaining
      ? `تم تحديث الصور والمعلومات. المتبقي بدون صور: ${remaining}. اضغط الزر مرة أخرى لاستكمال دفعة إضافية.`
      : "تم تحميل الصور والمعلومات المتاحة لكل المسلسلات.";
    renderEpisodeTracker();
  }
}

searchInput.addEventListener("input", () => {

  cancelActiveSearch();
  paginationState = null;
  const q = searchInput.value.trim();
  if (q !== "") {
    activeGenreFilter = null;
    movieGenreSelect.value = "";
    tvGenreSelect.value = "";

  }

    renderTab(currentTab);

  }
  searchDebounce = setTimeout(() => doSearch(q), 400);
});

function cancelActiveSearch() {
  searchController?.abort();
  searchController = null;
  searchRequestId++;
}

function rankSearchResults(items, query) {
  const q = query.toLowerCase().trim();
  return [...items].sort((a, b) => {
    const at = `${a.title || a.name || ""} ${a.original_title || a.original_name || ""}`.toLowerCase();
    const bt = `${b.title || b.name || ""} ${b.original_title || b.original_name || ""}`.toLowerCase();
    const exactA = at === q ? 3 : at.startsWith(q) ? 2 : at.includes(q) ? 1 : 0;
    const exactB = bt === q ? 3 : bt.startsWith(q) ? 2 : bt.includes(q) ? 1 : 0;
    if (exactA !== exactB) return exactB - exactA;
    return (b.vote_average || 0) - (a.vote_average || 0);
  });
}

async function doSearch(query) {
  cancelActiveSearch();
  const requestId = searchRequestId;
  searchController = new AbortController();
  main.innerHTML = loadingState();
  try {
    const wantedType = tabContentType();
    if (isAsianTab()) {
      let preferredResults = await searchMdlShows(
        query,
        searchController.signal,
        wantedType
      ).catch(error => {
        if (error.name === "AbortError") throw error;
        return [];
      });
      let sourceLabel = "MyDramaList";

      if (!preferredResults.length && wantedType === "tv") {
        preferredResults = await searchTvmazeAsianShows(
          query,
          searchController.signal
        ).catch(error => {
          if (error.name === "AbortError") throw error;
          return [];
        });
        sourceLabel = "TVmaze fallback";
      }

      if (activeYearFilter) {
        preferredResults = preferredResults.filter(item => {
          const year = parseInt(yearOf(item));
          return year >= activeYearFilter.min && year <= activeYearFilter.max;
        });
      }

      if (preferredResults.length) {
        preferredResults = await enrichItemsWithImdbRatings(preferredResults, wantedType);
        preferredResults = activeSort === "default"
          ? rankSearchResults(uniqueItems([], preferredResults), query)
          : applySort(uniqueItems([], preferredResults), activeSort, wantedType);
        paginationState = null;
        main.innerHTML =
          `<h2 class="section-title">نتائج البحث عن "${escapeHtml(query)}" <span class="count">(${preferredResults.length}) · ${sourceLabel}</span></h2>` +
          `<div class="grid" id="searchGrid">${preferredResults.map(item => cardHtml(item, wantedType)).join("")}</div>`;
        loadVisibleTvStatuses();
        return;
      }
    }

    const searchMovies = !wantedType || wantedType === "movie";
    const searchTv = !wantedType || wantedType === "tv";
    const calls = [];
    const arabicLookupCalls = [];
    if (searchMovies) {
      const movieSearchEndpoint = `/search/movie?language=en-US&query=${encodeURIComponent(query)}`;
      calls.push(tmdbFetch(movieSearchEndpoint, { signal: searchController.signal })
        .then(data => ({ kind: "movie", data })));
      arabicLookupCalls.push(fetchArabicList(movieSearchEndpoint).then(results => ({ kind: "movie", results })));
    }
    if (searchTv) {
      const tvSearchEndpoint = `/search/tv?language=en-US&query=${encodeURIComponent(query)}`;
      calls.push(tmdbFetch(tvSearchEndpoint, { signal: searchController.signal })
        .then(data => ({ kind: "tv", data })));
      arabicLookupCalls.push(fetchArabicList(tvSearchEndpoint).then(results => ({ kind: "tv", results })));
    }
    const [responses, arabicLookups] = await Promise.all([
      Promise.all(calls),
      Promise.all(arabicLookupCalls)
    ]);
    if (requestId !== searchRequestId || searchInput.value.trim() !== query) return;

    const arabicByKindAndId = new Map();
    arabicLookups.forEach(({ kind, results }) => {
      (results || []).forEach(item => arabicByKindAndId.set(`${kind}:${item.id}`, item));
    });

    let totalPages = 1;
    let results = [];
    responses.forEach(({ kind, data }) => {
      totalPages = Math.max(totalPages, data.total_pages || 1);
      const typed = (data.results || []).map(item => applyArabicTitle({
        ...item,
        media_type: kind === "movie" ? "movie" : "tv",
        type: kind === "movie" ? "movie" : "tv",
        source: kind === "tvmaze" ? "tvmaze" : kind === "mdl" ? "mdl" : (item.source || "tmdb")
      }, arabicByKindAndId.get(`${kind}:${item.id}`)));
      results.push(...typed);
    });

    results = filterForCurrentTab(results, wantedType);
    results = await enrichItemsWithImdbRatings(results, wantedType);
    results = activeSort === "default"
      ? rankSearchResults(uniqueItems([], results), query)
      : applySort(uniqueItems([], results), activeSort, wantedType);

    let yearSuffix = "";
    if (activeYearFilter) {
      results = results.filter(r => {
        const y = parseInt((r.release_date || r.first_air_date || "").slice(0,4));
        return y && y >= activeYearFilter.min && y <= activeYearFilter.max;
      });
      yearSuffix = ` · ${activeYearFilter.min}–${activeYearFilter.max}`;
    }

    paginationState = {
      mode: "search", page: 1, totalPages,
      query, items: results, containerId: "searchGrid", wantedType
    };
    if (results.length === 0) {
      main.innerHTML = `<h2 class="section-title">نتائج البحث عن "${escapeHtml(query)}"${yearSuffix}</h2>` + emptyState("لا توجد نتائج مطابقة. جرّب الاسم الإنجليزي، أو غيّر التبويب، أو وسّع نطاق السنوات.");
      return;
    }
    main.innerHTML = `<h2 class="section-title">نتائج البحث عن "${escapeHtml(query)}"${yearSuffix} <span class="count" id="resultCount">(${results.length})</span></h2>` +
      `<div class="grid" id="searchGrid">${results.map(r => cardHtml(r, r.media_type || r.type)).join("")}</div>` +
      loadMoreHtml("search", paginationState.page < paginationState.totalPages);
    loadVisibleTvStatuses();
  } catch(e) {
    if (e.name === "AbortError") return;
    main.innerHTML = errorState();
  } finally {
    if (requestId === searchRequestId) searchController = null;
  }
}

function updatePaginationCount(id, count, suffix = "") {
  const element = document.getElementById(id);
  if (element) element.textContent = `(${count})${suffix}`;
}

async function loadMoreResults(stream, button) {
  const state = paginationState;
  if (!state || !button || button.disabled) return;

  button.disabled = true;
  button.textContent = "جاري التحميل...";

  try {
    if (state.mode === "home") {
      const config = {
        homeMovies: {
          pageKey: "moviePage", totalKey: "movieTotalPages", endpointKey: "movieEndpoint",
          itemsKey: "movieItems", containerId: "homeMoviesRow", type: "movie"
        },
        homeTv: {
          pageKey: "tvPage", totalKey: "tvTotalPages", endpointKey: "tvEndpoint",
          itemsKey: "tvItems", containerId: "homeTvRow", type: "tv"
        },
        homeTop: {
          pageKey: "topPage", totalKey: "topTotalPages", endpointKey: "topEndpoint",
          itemsKey: "topItems", containerId: "homeTopRow", type: "movie"
        }
      }[stream];
      if (!config) throw new Error("Unknown home pagination stream");
      const nextPage = state[config.pageKey] + 1;
      const pageEndpoint = addPageParam(state[config.endpointKey], nextPage);
      const [data, arabicResults] = await Promise.all([
        tmdbFetch(pageEndpoint),
        fetchArabicList(pageEndpoint)
      ]);
      let incoming = uniqueItems(state[config.itemsKey], filterAllowedContent(mergeArabicTitles(data.results, arabicResults)));
      incoming = await enrichItemsWithImdbRatings(incoming, config.type);
      state[config.itemsKey].push(...incoming);
      state[config.pageKey] = nextPage;
      state[config.totalKey] = data.total_pages || state[config.totalKey];
      if (activeSort === "default") {
        appendCards(config.containerId, incoming, config.type);
      } else {
        replaceCards(config.containerId, state[config.itemsKey], config.type);
      }
      if (state[config.pageKey] >= state[config.totalKey]) button.closest(".load-more-wrap")?.remove();
    } else if (state.mode === "mdlCatalog") {
      const batch = await fetchMdlCatalogBatch(state.type, state.page + 1, state.items);
      const incoming = batch.items;
      state.items.push(...incoming);
      state.page = batch.lastPage;
      state.hasMore = batch.hasMore;
      if (activeSort === "default") {
        appendCards(state.containerId, incoming, state.type);
      } else {
        replaceCards(state.containerId, state.items, state.type);
      }
      updatePaginationCount("resultCount", state.items.length, " · MyDramaList");
      if (!state.hasMore) button.closest(".load-more-wrap")?.remove();
    } else if (state.mode === "single") {
      const nextPage = state.page + 1;
      const pageEndpoint = addPageParam(state.endpoint, nextPage);
      const [data, arabicResults] = await Promise.all([
        tmdbFetch(pageEndpoint),
        fetchArabicList(pageEndpoint)
      ]);
      let incoming = uniqueItems(state.items, filterForCurrentTab(mergeArabicTitles(data.results, arabicResults), state.type));
      incoming = await enrichItemsWithImdbRatings(incoming, state.type);
      state.items.push(...incoming);
      state.page = nextPage;
      state.totalPages = data.total_pages || state.totalPages;
      if (activeSort === "default") {
        appendCards(state.containerId, incoming, state.type);
      } else {
        replaceCards(state.containerId, state.items, state.type);
      }
      updatePaginationCount("resultCount", state.items.length);
      if (state.page >= state.totalPages) button.closest(".load-more-wrap")?.remove();
    } else if (state.mode === "dual" || state.mode === "asian") {
      const isMovies = stream === "movies";
      const pageKey = isMovies ? "moviePage" : "tvPage";
      const totalKey = isMovies ? "movieTotalPages" : "tvTotalPages";
      const endpoint = isMovies ? state.movieEndpoint : state.tvEndpoint;
      const items = isMovies ? state.movieItems : state.tvItems;
      const targetContainer = isMovies ? "moviesGrid" : "tvGrid";
      const targetType = isMovies ? "movie" : "tv";
      const nextPage = state[pageKey] + 1;
      const pageEndpoint = addPageParam(endpoint, nextPage);
      const [data, arabicResults] = await Promise.all([
        tmdbFetch(pageEndpoint),
        fetchArabicList(pageEndpoint)
      ]);
      let incoming = uniqueItems(items, filterAllowedContent(mergeArabicTitles(data.results, arabicResults)));
      incoming = await enrichItemsWithImdbRatings(incoming, targetType);
      items.push(...incoming);
      state[pageKey] = nextPage;
      state[totalKey] = data.total_pages || state[totalKey];
      if (activeSort === "default") {
        appendCards(targetContainer, incoming, targetType);
      } else {
        replaceCards(targetContainer, items, targetType);
      }
      updatePaginationCount(
        isMovies ? "movieResultCount" : "tvResultCount",
        items.length,
        !isMovies && state.mode === "asian" ? " · TMDB + TVmaze" : ""
      );
      if (state[pageKey] >= state[totalKey]) button.closest(".load-more-wrap")?.remove();
    } else if (state.mode === "recommendations") {
      const previousCount = state.visibleCount || RECOMMENDATION_PAGE_SIZE;
      const nextCount = Math.min(previousCount + (state.pageSize || RECOMMENDATION_PAGE_SIZE), state.items.length);
      const incoming = state.items.slice(previousCount, nextCount);
      state.visibleCount = nextCount;
      if (activeSort === "default") {
        appendRecommendationCards(state.containerId, incoming);
      } else {
        replaceRecommendationCards(state.containerId, state.items.slice(0, state.visibleCount));
      }
      if (state.visibleCount >= state.items.length) button.closest(".load-more-wrap")?.remove();
    } else if (state.mode === "search") {
      const nextPage = state.page + 1;
      const searchPageEndpoint = `/search/multi?language=en-US&query=${encodeURIComponent(state.query)}&page=${nextPage}`;
      const [data, arabicResults] = await Promise.all([
        tmdbFetch(searchPageEndpoint),
        fetchArabicList(searchPageEndpoint)
      ]);
      let incoming = mergeArabicTitles(data.results, arabicResults).filter(item =>
        (item.media_type === "movie" || item.media_type === "tv") && isAllowedContent(item)
      );
      if (isAsianTab()) {
        const allowedCountries = activeCountryFilter ? [activeCountryFilter] : ASIAN_COUNTRIES;
        incoming = incoming.filter(item => matchesAsianCountry(item, allowedCountries));
      }
      if (activeYearFilter) {
        incoming = incoming.filter(item => {
          const year = parseInt(yearOf(item));
          return year >= activeYearFilter.min && year <= activeYearFilter.max;
        });
      }
      incoming = uniqueItems(state.items, incoming);
      incoming = await enrichItemsWithImdbRatings(incoming, state.wantedType);
      state.items.push(...incoming);
      state.page = nextPage;
      state.totalPages = data.total_pages || state.totalPages;
      if (activeSort === "default") {
        const container = document.getElementById(state.containerId);
        if (container) {
          container.insertAdjacentHTML(
            "beforeend",
            incoming.map(item => cardHtml(item, item.media_type || item.type)).join("")
          );
        }
      } else {
        replaceCards(state.containerId, state.items);
      }
      updatePaginationCount("resultCount", state.items.length);
      if (state.page >= state.totalPages) button.closest(".load-more-wrap")?.remove();
    }

    loadVisibleTvStatuses();
    if (button.isConnected) {
      button.disabled = false;
      button.textContent = state.mode === "recommendations" ? "عرض المزيد" : "تحميل المزيد";
    }
  } catch(e) {
    button.disabled = false;
    button.textContent = "تعذّر التحميل — حاول مرة أخرى";
  }
}

// ---------- Infinite scroll (all tabs except home) ----------
// Home keeps manual "load more" buttons per row; every other view (movies, tv,
// asian tabs, genre/year filters, search) auto-loads the next page once its
// button scrolls near the viewport.
const infiniteScrollObserver = "IntersectionObserver" in window
  ? new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const button = entry.target;
        if (!button.isConnected || button.disabled) return;
        if (paginationState && paginationState.mode === "home") return;
        if (paginationState && paginationState.mode === "recommendations") return;
        loadMoreResults(button.dataset.loadStream, button);
      });
    }, { rootMargin: "600px" })
  : null;

function observeLoadMoreButtons() {
  if (!infiniteScrollObserver) return;
  main.querySelectorAll(".load-more-btn[data-load-stream]").forEach((button) => {
    infiniteScrollObserver.observe(button);
  });
}

// Re-scan whenever the main content changes (tab switch, filter, search,
// pagination append) so newly inserted "load more" buttons get observed too.
let observerScanScheduled = false;
const mainContentObserver = new MutationObserver(() => {
  if (observerScanScheduled) return;
  observerScanScheduled = true;
  requestAnimationFrame(() => {
    observerScanScheduled = false;
    observeLoadMoreButtons();
  });
});
mainContentObserver.observe(main, { childList: true, subtree: true });
